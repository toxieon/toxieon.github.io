<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1117">
    <title>Hub</title>
    <link rel="icon" href="favicon.svg?v=0.4.1" type="image/svg+xml">
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="stylesheet" href="../shared/nd-core.css">
    <link rel="stylesheet" href="styles.css?v=0.5.0">
    <script src="../shared/nd-match.js"></script>
    <script src="../shared/nd-cache.js"></script>
    <script src="../shared/nd-ui.js"></script>
      <script src="../shared/nd-pwa.js" defer></script>
  </head>
  <body>
    <div class="hub-shell">
      <div class="hub-frame">
        <header class="topbar">
          <a class="brand" href="./" aria-label="Hub home">
            <span class="brand-mark">H</span>
            <span>
              <span class="brand-name">Hub</span>
              <span class="brand-subtitle">Neilldata app drawer</span>
            </span>
          </a>

          <div class="topbar-actions">
            <button class="tab is-active" type="button" data-view="apps" aria-label="Apps" title="Apps">
              <span class="grid-glyph" aria-hidden="true"></span>
              <span>Apps</span>
            </button>
          </div>
        </header>

        <main class="main">
          <section id="appsView" class="view is-active" aria-labelledby="appsHeading">
            <div class="view-panel">
              <div class="panel-header">
                <div class="panel-title">
                  <h1 id="appsHeading">Apps</h1>
                  <p id="status" class="status">Neill Data suite</p>
                </div>
                <div class="summary" aria-live="polite">
                  <span id="visibleCount">0</span>
                  <small>apps</small>
                </div>
              </div>

              <div class="filter-panel">
                <div class="controls">
                  <label class="search-box" for="searchInput">
                    <span class="search-glyph" aria-hidden="true"></span>
                    <input id="searchInput" type="search" placeholder="Search apps" autocomplete="off">
                  </label>
                </div>
              </div>

              <div id="recentsRow" class="recents-row" hidden>
                <h2 class="recents-title">Continue where you left off</h2>
                <div id="recentsList" class="recents-list"></div>
              </div>

              <div id="grid" class="app-grid" aria-label="Apps"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="app-card">
        <a class="app-link" target="_blank" rel="noreferrer">
          <span class="icon-wrap">
            <img alt="" loading="lazy">
            <span class="fallback-icon"></span>
          </span>
          <span class="app-title"></span>
          <span class="app-path"></span>
        </a>
      </article>
    </template>

    <script src="app.js?v=0.5.0" type="module"></script>
  </body>
</html>
