function portrait(state){const el=document.getElementById('p-portrait');if(!el)return;el.className='portrait '+state;clearTimeout(portrait._t);if(state!=='victory'&&state!=='grimace')portrait._t=setTimeout(()=>{el.className='portrait idle';},1100);}
function foePortrait(state){const el=document.getElementById('e-portrait');if(!el)return;el.className='portrait foe '+state;clearTimeout(foePortrait._t);foePortrait._t=setTimeout(()=>{el.className='portrait foe idle';},1100);}

/* ============ SIGNATURE CUTSCENE (Sprint 4) ============ */
function showCutscene(c,cb){
  const seen=Meta.data.sigsSeen&&Meta.data.sigsSeen[c.id];
  const cut=document.getElementById('cut'),art=document.getElementById('cutart');
  art.innerHTML=`<div class="scene">${c.scene}</div><div class="cn">${c.name}</div>${seen?'':`<div class="cd">${c.sceneText}</div>`}`;
  cut.classList.remove('flash');if(seen)cut.classList.add('flash');
  cut.classList.add('show');Sound.win();FX.shake();
  if(!seen){if(!Meta.data.sigsSeen)Meta.data.sigsSeen={};Meta.data.sigsSeen[c.id]=true;Meta.save();}
  clearTimeout(showCutscene._t);
  showCutscene._t=setTimeout(()=>{cut.classList.remove('show');cut.classList.remove('flash');if(cb)cb();},seen?1100:2900);
}

/* ============ PIRATE RTS BOARDING MODE ============ */
const Pirate={
  start(kind){
    if(this.loop){clearInterval(this.loop);this.loop=null;}
    this.kind=kind;this.rows=8;this.cols=8;this.tickN=0;this.maxEnergy=6;this.energy=4;this.paused=false;this.sel=null;this.over=false;
    this.wind=this.rdir();this.windT=3;this.ships=[];this.bs=null;this.sunk=[];this.btUsed=false;this.smokeT=0;
    game.faction={name:kind==='boss'?(BOSSES[game.act-1]||'Carrion Fleet'):['Corsair Skiffs','Reef Swarm','Ghost Tide'][Math.floor(Math.random()*3)],ai:'pirate'};
    game.fleet.filter(s=>!s.sunk).forEach(s=>this.add(s.name,s.len,'p'));
    const ec=kind==='scout'?1:kind==='boss'?4:kind==='elite'?3:2;
    const types=[['Destroyer',2],['Cruiser',3],['Battleship',4],['Submarine',3],['Carrier',5]];
    for(let i=0;i<ec;i++){const t=types[i%types.length];this.add(t[0],t[1],'e');}
    this.place();this.buildUI();game.show('pirate');setupPortraits();
    this.render();this.loop=setInterval(()=>this.tick(),2000);
  },
  rdir(){return ['N','S','E','W'][Math.floor(Math.random()*4)];},
  add(name,len,owner){const hull=owner==='p'?len+1:len;this.ships.push({name,owner,len,r:0,c:0,dir:null,hull,maxHull:hull,crew:len,maxCrew:len,grapT:0,grapBy:null,boarding:false,captured:false,_dead:false});},
  place(){const occ=new Set();this.ships.forEach(s=>{for(let g=0;g<300;g++){const r=s.owner==='p'?this.rows-1-(g%2):(g%2);const c=Math.floor(Math.random()*this.cols);if(occ.has(r+','+c))continue;occ.add(r+','+c);s.r=r;s.c=c;return;}});},
  inb(r,c){return r>=0&&c>=0&&r<this.rows&&c<this.cols;},
  occ(r,c,ex){return this.ships.find(s=>s!==ex&&s.hull>0&&s.r===r&&s.c===c);},
  delta(d){return d==='N'?[-1,0]:d==='S'?[1,0]:d==='E'?[0,1]:d==='W'?[0,-1]:[0,0];},
  opp(d){return {N:'S',S:'N',E:'W',W:'E'}[d];},
  toward(a,b){if(Math.abs(b.r-a.r)>=Math.abs(b.c-a.c))return b.r<a.r?'N':b.r>a.r?'S':(b.c<a.c?'W':'E');return b.c<a.c?'W':'E';},
  nearest(s,owner){let best=null,bd=1e9;this.ships.forEach(o=>{if(o.owner===owner&&o.hull>0){const d=Math.abs(o.r-s.r)+Math.abs(o.c-s.c);if(d<bd){bd=d;best=o;}}});return best;},
  tick(){if(this.paused||this.over)return;this.tickN++;
    if(this.energy<this.maxEnergy)this.energy++;
    if(--this.windT<=0){this.wind=this.rdir();this.windT=3;this.log('🌬 Wind shifts '+this.wind+'.');}
    this.ships.forEach(s=>{if(s.ttl!=null&&--s.ttl<=0){s.hull=0;this.log('A ghost ship fades back into the deep.');}});
    // enemy AI heads to nearest ally
    if(this.smokeT>0){this.smokeT--;this.log('💨 The enemy gropes blindly through the smoke.');}
    else this.ships.filter(s=>s.owner==='e'&&s.hull>0).forEach(s=>{const t=this.nearest(s,'p');if(t)s.dir=this.toward(s,t);});
    // grappled pull
    this.ships.forEach(s=>{if(s.grapT>0&&s.grapBy&&s.grapBy.hull>0){const[dr,dc]=this.delta(this.toward(s,s.grapBy));const nr=s.r+dr,nc=s.c+dc;if(this.inb(nr,nc)&&!this.occ(nr,nc,s)){s.r=nr;s.c=nc;}s.grapT--;s.dir=null;}});
    // movement
    this.ships.filter(s=>s.hull>0&&s.dir&&s.grapT<=0).forEach(s=>{const[dr,dc]=this.delta(s.dir);const nr=s.r+dr,nc=s.c+dc;
      if(!this.inb(nr,nc)){s.dir=null;return;}if(this.occ(nr,nc,s))return;
      if(s.owner==='p'&&this.opp(this.wind)===s.dir){if(this.energy<=0)return;this.energy--;}
      s.r=nr;s.c=nc;});
    this.broadsides();this.resolve();this.render();},
  broadsides(){if(this.bs)return;const adj=(a,b)=>Math.abs(a.r-b.r)+Math.abs(a.c-b.c)===1;
    for(const p of this.ships.filter(s=>s.owner==='p'&&s.hull>0)){const e=this.ships.find(s=>s.owner==='e'&&s.hull>0&&adj(p,s));if(e){this.openBroadside(p,e);return;}}},
  openBroadside(p,e){this.paused=true;this.bs={p,e};const n=18;const idx=shuffle([...Array(n).keys()]);const sec=Array(n).fill('');let k=0;
    for(let i=0;i<e.hull&&k<n;i++)sec[idx[k++]]='H';for(let i=0;i<e.crew&&k<n;i++)sec[idx[k++]]='C';
    this.bs.sec=sec;this.bs.shown=Array(n).fill(false);Sound.card();this.renderBroadside();},
  renderBroadside(){const {p,e}=this.bs;const m=document.getElementById('modal');
    let cells='';this.bs.sec.forEach((s,i)=>{const sh=this.bs.shown[i];let cls='bscell',t='';
      if(sh){if(s==='H'){cls+=' hit';t='💥';}else if(s==='C'){cls+=' cc';t='⚑';}else{cls+=' miss';t='·';}}
      cells+=`<div class="${cls}" onclick="Pirate.bsFire(${i})">${t}</div>`;});
    m.innerHTML=`<h2 style="font-size:.85rem;color:var(--ord)">⚔ BROADSIDE</h2>
      <p style="margin:4px 0">Your <b>${p.name}</b> grinds alongside the <b>${e.name}</b>. Tap sections — 💥 hull sinks her, ⚑ crew captures her. She fires back with every volley.</p>
      <div class="bsbars"><div class="bsbar"><div class="lab">Your hull ${Math.max(0,p.hull)}/${p.maxHull}</div><div class="t"><i style="width:${100*Math.max(0,p.hull)/p.maxHull}%;background:#5fe0b0"></i></div></div>
      <div class="bsbar"><div class="lab">${e.name}: hull ${Math.max(0,e.hull)} · crew ${Math.max(0,e.crew)}</div><div class="t"><i style="width:${100*Math.max(0,e.hull)/e.maxHull}%;background:#ff7a78"></i></div></div></div>
      <div class="bsgrid">${cells}</div>
      <button class="btn btn-end" onclick="Pirate.bsRetreat()">⚐ Disengage</button>`;
    document.getElementById('ovl').classList.add('show');},
  bsFire(i){if(!this.bs||this.bs.shown[i])return;this.bs.shown[i]=true;const {p,e}=this.bs;const s=this.bs.sec[i];
    if(s==='H'){e.hull--;Sound.hit();}else if(s==='C'){e.crew--;Sound.hit();}else Sound.miss();
    this.bs.rf=(this.bs.rf||0)+1;if(e.hull>0&&e.crew>0&&this.bs.rf%2===0)p.hull--;this.bsCheck();},
  bsCheck(){const {p,e}=this.bs;
    if(e.crew<=0&&e.hull>0&&!e.captured){e.captured=true;e.owner='p';e.hull=1;e.crew=e.maxCrew;e.dir=null;e.boarding=false;game.fleet.push({name:e.name,len:e.len,hits:e.len-1,sunk:false});this.log('⚓ <b>Captured the '+e.name+'!</b> She flies your colours now.');portrait('triumph');foePortrait('grimace');Sound.sink();return this.closeBroadside();}
    if(e.hull<=0){e._dead=true;e.hull=0;if(e.ttl==null)this.sunk.push({name:e.name,len:e.len,r:e.r,c:e.c});this.log('The '+e.name+' is blown apart at point-blank!');portrait('triumph');Sound.sink();return this.closeBroadside();}
    if(p.hull<=0){p._dead=true;p.hull=0;if(p.ttl==null)this.sunk.push({name:p.name,len:p.len,r:p.r,c:p.c});this.log('Your '+p.name+' is lost in the exchange!');portrait('grimace');Sound.sink();return this.closeBroadside();}
    this.renderBroadside();},
  bsRetreat(){const {p,e}=this.bs;const away=this.opp(this.toward(p,e));const[dr,dc]=this.delta(away);const nr=p.r+dr,nc=p.c+dc;if(this.inb(nr,nc)&&!this.occ(nr,nc,p)){p.r=nr;p.c=nc;}this.log('Disengaged from the '+e.name+'.');this.closeBroadside();},
  closeBroadside(){document.getElementById('ovl').classList.remove('show');this.bs=null;this.ships=this.ships.filter(s=>s.hull>0);if(this.sel&&this.sel.hull<=0)this.sel=null;this.paused=false;this.render();
    const en=this.ships.filter(s=>s.owner==='e'&&s.hull>0).length,al=this.ships.filter(s=>s.owner==='p'&&s.hull>0).length;
    if(en===0)this.win();else if(al===0)this.lose();},
  resolve(){
    this.ships.forEach(s=>{if(s.owner==='e'&&s.crew<=0&&s.hull>0&&!s.captured){s.captured=true;s.owner='p';s.hull=1;s.crew=Math.max(1,s.maxCrew);s.dir=null;s.boarding=false;this.log('⚓ <b>Captured the '+s.name+'!</b> It joins your fleet.');game.fleet.push({name:s.name,len:s.len,hits:s.len-1,sunk:false});portrait('triumph');foePortrait('grimace');Sound.sink();}});
    this.ships.filter(s=>s.hull<=0&&!s._dead).forEach(s=>{s._dead=true;if(s.ttl==null)this.sunk.push({name:s.name,len:s.len,r:s.r,c:s.c});this.log((s.owner==='p'?'Your ':'Enemy ')+s.name+' sinks!');if(s.owner==='p'){portrait('grimace');}else{portrait('triumph');foePortrait('hit');}Sound.sink();});
    this.ships=this.ships.filter(s=>s.hull>0);if(this.sel&&this.sel.hull<=0)this.sel=null;
    const en=this.ships.filter(s=>s.owner==='e'&&s.hull>0).length,al=this.ships.filter(s=>s.owner==='p'&&s.hull>0).length;
    if(en===0)this.win();else if(al===0)this.lose();},
  buildUI(){document.getElementById('pirate').innerHTML=`<div class="pirate-wrap">
    <div class="pmaphdr"><span>🏴‍☠️ BOARDING — ${game.faction.name}${this.kind==='boss'?' (BOSS)':''}</span><span id="p-wind">🌬 ${this.wind}</span><span>⚡<b id="p-energy">${this.energy}</b></span></div>
    <div class="ocean" id="ocean"></div>
    <div class="pctrl">
      <div class="dpad"><button onclick="Pirate.setDir('N')">▲</button><div><button onclick="Pirate.setDir('W')">◀</button><button onclick="Pirate.setDir('stop')">■</button><button onclick="Pirate.setDir('E')">▶</button></div><button onclick="Pirate.setDir('S')">▼</button></div>
      <div class="pacts">
        <button class="btn btn-end btn-sm" onclick="Pirate.grapple()">🪝 Grapple ⚡2</button>
        <button class="btn btn-end btn-sm" onclick="Pirate.windSurge()">🌬 Wind Surge ⚡1</button>
        <button class="btn btn-end btn-sm" onclick="Pirate.chainVolley()">💥 Chain Volley ⚡2</button>
        <button class="btn btn-end btn-sm" onclick="Pirate.patch()">🛠 Patch ⚡2</button>
        <button class="btn btn-end btn-sm" onclick="Pirate.smokeBurst()">💨 Smoke ⚡2</button>
        <button class="btn btn-end btn-sm" onclick="Pirate.toggleBoard()">🧗 Board/Broadside</button>
        <button class="btn btn-gold btn-sm" onclick="Pirate.blackTideSig()">🌊 Black Tide ⚡3</button>
        <button class="btn btn-end btn-sm" id="p-pause" onclick="Pirate.togglePause()">⏸ Pause</button>
        <button class="btn btn-fire btn-sm" onclick="Pirate.flee()">⚐ Forfeit</button>
      </div>
    </div>
    <div class="phint">Tap your ship (⛵) to select, steer with the pad (wind ⚡ costs against you). Drift alongside an enemy to broadside; toggle 🧗 to take crew & capture instead. Grapple drags a ship in for boarding.</div>
    <div class="log" id="p-log" style="margin-top:8px"></div></div>`;},
  render(){const e=document.getElementById('p-energy');if(e)e.textContent=this.energy;const w=document.getElementById('p-wind');if(w)w.textContent='🌬 '+this.wind;
    const o=document.getElementById('ocean');if(!o)return;o.style.setProperty('--cols',this.cols);let html='';
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const s=this.ships.find(x=>x.r===r&&x.c===c&&x.hull>0);let cls='ocell',inner='';
      if(s){cls+=s.owner==='p'?' pship2':' eship2';if(s===this.sel)cls+=' selp';if(s.boarding)cls+=' boarding';
        const a={N:'↑',S:'↓',E:'→',W:'←'}[s.dir]||'';
        inner=`<span class="tok">${s.ttl!=null?'👻':s.captured?'🏴':s.owner==='p'?'⛵':'🚢'}</span><span class="hdg">${a}</span><span class="hp"><i style="width:${100*s.hull/s.maxHull}%"></i></span><span class="cw"><i style="width:${100*Math.max(0,s.crew)/s.maxCrew}%"></i></span>`;}
      html+=`<div class="${cls}" onclick="Pirate.cellClick(${r},${c})">${inner}</div>`;}
    o.innerHTML=html;},
  cellClick(r,c){const s=this.ships.find(x=>x.r===r&&x.c===c&&x.hull>0);if(s&&s.owner==='p'){this.sel=s;this.render();return;}if(this.sel)this.setDir(this.toward(this.sel,{r,c}));},
  setDir(d){if(!this.sel){game.toast('Select your ship first');return;}this.sel.dir=(d==='stop')?null:d;this.render();},
  grapple(){if(!this.sel){game.toast('Select your ship');return;}const e=this.nearest(this.sel,'e');if(!e){game.toast('No enemy left');return;}if(Math.abs(e.r-this.sel.r)+Math.abs(e.c-this.sel.c)>3){game.toast('No enemy in grapple range (3)');return;}if(this.energy<2){game.toast('Need ⚡2');return;}this.energy-=2;e.grapT=3;e.grapBy=this.sel;this.log('🪝 Grappled the '+e.name+' — hauling it in!');Sound.card();this.render();},
  toggleBoard(){if(!this.sel){game.toast('Select your ship');return;}this.sel.boarding=!this.sel.boarding;game.toast(this.sel.name+(this.sel.boarding?': BOARD (drains crew → capture)':': BROADSIDE (drains hull → sink)'));this.render();},
  togglePause(){this.paused=!this.paused;const b=document.getElementById('p-pause');if(b)b.textContent=this.paused?'▶ Resume':'⏸ Pause';},
  flee(){if(this.over)return;this.over=true;if(this.loop){clearInterval(this.loop);this.loop=null;}game.defeat();},
  log(h){const l=document.getElementById('p-log');if(!l)return;const d=document.createElement('div');d.className='ln';d.innerHTML=h;l.appendChild(d);l.scrollTop=l.scrollHeight;},
  chainVolley(){if(!this.sel){game.toast('Select a ship');return;}if(this.energy<2){game.toast('Need ⚡2');return;}const adj=this.ships.filter(s=>s.owner==='e'&&s.hull>0&&Math.abs(s.r-this.sel.r)+Math.abs(s.c-this.sel.c)===1);if(!adj.length){game.toast('No adjacent enemy');return;}this.energy-=2;adj.forEach(e=>e.hull--);this.log('💥 Chain volley rakes '+adj.length+' hull(s)!');Sound.hit();this.resolve();this.render();},
  patch(){if(!this.sel){game.toast('Select a ship');return;}if(this.sel.hull>=this.sel.maxHull){game.toast('Hull already full');return;}if(this.energy<2){game.toast('Need ⚡2');return;}this.energy-=2;this.sel.hull++;game.toast('🛠 Patched +1 hull');this.render();},
  smokeBurst(){if(this.energy<2){game.toast('Need ⚡2');return;}this.energy-=2;this.smokeT=2;this.log('💨 Smoke deployed — enemy loses your bearing for 2 ticks.');this.render();},
  windSurge(){if(!this.sel){game.toast('Select a ship');return;}if(!this.sel.dir){game.toast('Set a heading first');return;}if(this.energy<1){game.toast('Need ⚡1');return;}
    const[dr,dc]=this.delta(this.sel.dir);const nr=this.sel.r+dr,nc=this.sel.c+dc;if(this.inb(nr,nc)&&!this.occ(nr,nc,this.sel)){this.energy--;this.sel.r=nr;this.sel.c=nc;game.toast('🌬 Wind surge — free move!');this.broadsides();this.render();}else game.toast('Blocked');},
  deltaAll(r,c){return [[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1],[r-1,c-1],[r+1,c+1],[r-1,c+1],[r+1,c-1]];},
  freeNear(r,c){for(const[rr,cc]of this.deltaAll(r,c)){if(this.inb(rr,cc)&&!this.occ(rr,cc,null))return[rr,cc];}return null;},
  blackTideSig(){if(this.btUsed){game.toast('Black Tide already called this battle');return;}if(this.energy<3){game.toast('Need ⚡3');return;}
    this.btUsed=true;this.energy-=3;this.paused=true;
    showCutscene(SIGS.blacktide,()=>{let n=0;this.sunk.slice(-4).forEach(s=>{const cell=this.freeNear(s.r,s.c);if(cell){this.ships.push({name:s.name+' ghost',owner:'p',len:s.len,r:cell[0],c:cell[1],dir:null,hull:1,maxHull:1,crew:1,maxCrew:1,grapT:0,grapBy:null,boarding:false,captured:false,_dead:false,ttl:3});n++;}});
      this.log('🌊 <b>THE BLACK TIDE RISES</b> — '+n+' ghost ship'+(n===1?'':'s')+' under your flag for 3 turns!');this.paused=false;this.render();});},
  win(){if(this.over)return;this.over=true;if(this.loop){clearInterval(this.loop);this.loop=null;}portrait('victory');
    const captures=this.ships.filter(s=>s.captured).length;const total=500+captures*120+(this.kind==='boss'?800:this.kind==='elite'?300:0);
    game.runScore+=total;game.battlesWon++;game.actBattle++;game.addGold(({boss:55,elite:35,scout:8,standard:15})[this.kind]||15);game.renderTop();Sound.win();
    const m=document.getElementById('modal');m.innerHTML=`<h2 class="win">${this.kind==='boss'?'BOSS BOARDED':'WATERS TAKEN'}</h2><p>Boarding action won${captures?` — ${captures} ship(s) captured`:''}. +${total} score.</p>${game.summary()}<button class="btn btn-go" onclick="game.closeModal();game.finishNode()">Continue ▸</button>`;document.getElementById('ovl').classList.add('show');},
  lose(){if(this.over)return;this.over=true;if(this.loop){clearInterval(this.loop);this.loop=null;}portrait('grimace');game.defeat();},
};

/* ============ BATTLE MODE (Phase B — synced 1v1 duel) ============ */
const BM_CARDS={
  salvo:{name:'Double Salvo',ic:'💥',cat:'ORDNANCE',cost:1,ds:'+1 shot this turn.',type:'off'},
  barrage:{name:'Barrage',ic:'🔱',cat:'ORDNANCE',cost:2,ds:'+2 shots this turn.',type:'off'},
  spread:{name:'Spread Shot',ic:'🎯',cat:'ORDNANCE',cost:1,ds:'Next shot hits a 1×3 row.',type:'arm',shape:'spread'},
  torpedo:{name:'Torpedo',ic:'🚀',cat:'ORDNANCE',cost:1,ds:'Next shot hits a 3×1 column.',type:'arm',shape:'torpedo'},
  ironhull:{name:'Iron Hull',ic:'🛡️',cat:'MANEUVER',cost:1,ds:'Block the next 2 hits.',type:'iron'},
  evade:{name:'Evasive',ic:'🌀',cat:'MANEUVER',cost:1,ds:'50% to dodge each shot next enemy turn.',type:'evade'},
  smoke:{name:'Smoke Screen',ic:'💨',cat:'MANEUVER',cost:2,ds:'Enemy wholly misses next turn.',type:'smoke'},
  decoy:{name:'Ghost Buoy',ic:'🛟',cat:'DECOY',cost:1,ds:'Waste the enemy’s next would-be hit.',type:'decoy'},
  sabotage:{name:'Sabotage',ic:'📡',cat:'FLAGSHIP',cost:2,ds:'Foe draws 1 fewer card next turn.',type:'mp'},
};
const BM_DEFAULT_DECK=['salvo','salvo','spread','torpedo','ironhull','evade','decoy','barrage','smoke','sabotage'];
function bmShape(shape,r,c){if(shape==='spread')return [[r,c-1],[r,c],[r,c+1]];if(shape==='torpedo')return [[r-1,c],[r,c],[r+1,c]];return [[r,c]];}
const BM={
  send(o){}, // overridden: real game -> Net.send; tests -> opponent.onMsg
  start(side,opts){this.opts=opts||{};this.threshold=this.opts.bestOf||2;this.side=side;this.foeSide=side==='a'?'b':'a';this.wins={a:0,b:0};this.round=1;this.gold=60;this.deck=BM_DEFAULT_DECK.slice();this.over=false;
    if(!this.opts.noHandler)game._mpHandler=m=>this.onMsg(m);this.drawPile=null;this.newRound();this.show();},
  newRound(){this.R=8;this.C=8;this.myReady=false;this.foeReady=false;this.phase='deploy';
    this.deploy=placeFleet(Object.keys(SHIP_DEFS).map(n=>({name:n,len:SHIP_DEFS[n]})),this.R,this.C);
    this.foe={grid:emptyGrid(this.R,this.C),alive:5,sunk:[]};this.flags={iron:0,decoy:0,smoke:false,evade:false};
    this.armed=null;this.energy=2;this.shots=1;this.hand=[];this.waiting=false;this.drawPenalty=0;this.myTurn=false;},
  randomize(){if(this.phase!=='deploy'||this.myReady)return;this.deploy=placeFleet(Object.keys(SHIP_DEFS).map(n=>({name:n,len:SHIP_DEFS[n]})),this.R,this.C);Sound.card();this.show();},
  ready(){if(this.phase!=='deploy'||this.myReady)return;this.myReady=true;this.my=bakeBoard(this.deploy,this.R,this.C);this.send({t:'ready'});Sound.win();if(this.foeReady)this.begin();else this.show();},
  begin(){this.phase='combat';this.myTurn=(this.side==='a');this.startTurn();},
  startTurn(){this.flags.smoke=false;this.flags.evade=false;this.armed=null;this.energy=2;this.shots=1;this.waiting=false;
    this.drawPile=this.drawPile&&this.drawPile.length?this.drawPile:shuffle(this.deck.slice());
    const want=4-this.drawPenalty;this.drawPenalty=0;this.hand=[];for(let i=0;i<want;i++){if(!this.drawPile.length)this.drawPile=shuffle(this.deck.slice());this.hand.push(this.drawPile.pop());}
    this.show();},
  playCard(i){if(this.phase!=='combat'||!this.myTurn||this.waiting)return;const id=this.hand[i];if(!id)return;const c=BM_CARDS[id];if(c.cost>this.energy){game.toast&&game.toast('Not enough energy');return;}
    this.energy-=c.cost;this.hand.splice(i,1);Sound.card();
    if(c.type==='off')this.shots+=(id==='barrage'?2:1);
    else if(c.type==='arm')this.armed=c.shape;
    else if(c.type==='iron')this.flags.iron+=2;
    else if(c.type==='evade')this.flags.evade=true;
    else if(c.type==='smoke')this.flags.smoke=true;
    else if(c.type==='decoy')this.flags.decoy+=1;
    else if(c.type==='mp'){this.send({t:'sabotage'});}
    this.show();},
  fire(r,c){if(this.phase!=='combat'||!this.myTurn||this.waiting||this.shots<=0)return;if(this.foe.grid[r][c].shot){game.toast&&game.toast('Already fired there');return;}
    const shape=this.armed||'single';this.armed=null;this.waiting=true;this.send({t:'fire',r,c,shape});this.show();},
  resolveIncoming(shape,r,c){const out=[];for(const [rr,cc] of bmShape(shape,r,c)){if(rr<0||cc<0||rr>=this.R||cc>=this.C)continue;const t=this.my.grid[rr][cc];if(t.shot)continue;t.shot=true;
      if(t.ship){let dmg=true;
        if(this.flags.smoke)dmg=false;else if(this.flags.evade&&Math.random()<0.5)dmg=false;else if(this.flags.decoy>0){this.flags.decoy--;dmg=false;}else if(this.flags.iron>0){this.flags.iron--;dmg=false;t.deflect=true;}
        if(dmg){t.hit=true;const s=t.shipRef;s.hits++;let sunk=false;if(s.hits>=s.len&&!s.sunk){s.sunk=true;s.cells.forEach(([a,b])=>this.my.grid[a][b].sunkx=true);this.my.alive--;sunk=true;}out.push({r:rr,c:cc,hit:true,sunk,ship:sunk?s.name:null});}
        else out.push({r:rr,c:cc,hit:false});
      } else out.push({r:rr,c:cc,hit:false});}
    return {cells:out,alive:this.my.alive};},
  onMsg(m){switch(m.t){
    case 'ready':this.foeReady=true;if(this.myReady)this.begin();else this.show();break;
    case 'sabotage':this.drawPenalty=1;break;
    case 'fire':{const res=this.resolveIncoming(m.shape,m.r,m.c);this.send({t:'result',cells:res.cells,alive:res.alive});Sound.hit();
      if(res.alive<=0){this.send({t:'roundover',winner:this.foeSide});this.roundOver(this.foeSide);}else this.show();break;}
    case 'result':{for(const cell of m.cells){const t=this.foe.grid[cell.r][cell.c];t.shot=true;if(cell.hit){t.hit=true;if(cell.sunk){t.sunkx=true;this.foe.sunk.push(cell.ship);}}}this.foe.alive=m.alive;this.waiting=false;
      if(m.alive<=0){/* wait for roundover from foe */}else{this.shots--;if(this.shots<=0){this.send({t:'endturn'});this.myTurn=false;}this.show();}break;}
    case 'endturn':this.myTurn=true;this.startTurn();break;
    case 'roundover':this.roundOver(m.winner);break;
    case 'shopdone':this.foeShop=true;if(this.myShop)this.nextRound();break;
    case 'rematch':this.foeRe=true;if(this.myRe){this.wins={a:0,b:0};this.round=0;this.gold=60;this.deck=BM_DEFAULT_DECK.slice();this.myRe=this.foeRe=false;this.nextRound();}break;
    case 'left':this.phase='left';this.show();break;
  }},
  roundOver(winner){if(this.phase==='shop'||this.phase==='over')return;this.wins[winner]=(this.wins[winner]||0)+1;
    if(this.wins[winner]>=this.threshold){this.phase='over';this.winner=winner;if(this.opts&&this.opts.onEnd){this.opts.onEnd(winner);return;}if(winner===this.side){Meta.data.mpWins=(Meta.data.mpWins||0)+1;Meta.save();game.evalAchievements&&game.evalAchievements();}this.show();return;}
    this.phase='shop';this.myShop=false;this.foeShop=false;this.gold+=50;this.shopCards=shuffle(Object.keys(BM_CARDS)).slice(0,3);this.show();},
  buyShop(id){if(this.phase!=='shop'||this.myShop)return;if(this.gold<40){game.toast&&game.toast('Need 🪙40');return;}this.gold-=40;this.deck.push(id);Sound.coin();this.shopCards=this.shopCards.filter(x=>x!==id);this.show();},
  shopReady(){if(this.phase!=='shop'||this.myShop)return;this.myShop=true;this.send({t:'shopdone'});if(this.foeShop)this.nextRound();else this.show();},
  nextRound(){this.round++;this.drawPile=null;this.newRound();this.show();},
  rematch(){if(this.phase!=='over')return;this.myRe=true;this.send({t:'rematch'});if(this.foeRe){this.wins={a:0,b:0};this.round=0;this.gold=60;this.deck=BM_DEFAULT_DECK.slice();this.myRe=this.foeRe=false;this.nextRound();}else{game.toast&&game.toast('Waiting for opponent…');}},
  leave(){this.over=true;Net.close();game.renderHome();game.show('title');},
  /* ---- render ---- */
  show(){const el=document.getElementById('bm');if(!el)return;const meW=this.wins[this.side]||0,foeW=this.wins[this.foeSide]||0;
    let body='';
    if(this.phase==='deploy'){
      body=`<div class="bm-status">DEPLOY YOUR FLEET · Round ${this.round}</div>
        <div style="display:flex;justify-content:center"><div class="board" style="--cols:${this.C};max-width:360px">${this.deployGrid()}</div></div>
        <div class="place-btns" style="margin-top:10px">${this.myReady?'<div style="color:var(--ink2);font-size:.85rem">Waiting for opponent…</div>':'<button class="btn btn-end" onclick="BM.randomize()">⚄ Randomize</button><button class="btn btn-go" onclick="BM.ready()">⚓ Ready</button>'}</div>`;
    } else if(this.phase==='combat'){
      const turn=this.myTurn?'<span style="color:var(--good)">YOUR TURN</span>':'<span style="color:var(--bad)">OPPONENT’S TURN</span>';
      body=`<div class="bm-status">⚔️ Battle ${meW}–${foeW} · Round ${this.round} · ${turn}${this.waiting?' · …':''}</div>
        <div class="grids"><div class="panel enemy"><div class="panel-label">Enemy Waters <span class="tag">hulls left: ${this.foe.alive}</span></div><div class="board" style="--cols:${this.C}">${this.foeGrid()}</div></div>
        <div class="panel"><div class="panel-label">Your Fleet <span class="tag">hulls: ${this.my.alive}</span></div><div class="board" style="--cols:${this.C}">${this.myGrid()}</div></div></div>
        <div class="handlbl">⟡ Hand · ⚡${this.energy} · 🎯${this.shots} shots ⟡</div><div class="hand">${this.handHtml()}</div>
        <button class="btn btn-end btn-sm" onclick="BM.leave()">Forfeit</button>`;
    } else if(this.phase==='shop'){
      body=`<div class="bm-status">🪙 SHOP · Round ${this.round} won by ${(this.wins[this.side]>foeW?'YOU':'OPPONENT')} · Score ${meW}–${foeW}</div>
        <div class="desc">Gold: <b>${this.gold}</b> — buy cards into your deck (🪙40 each), then ready up.</div>
        <div class="rewards">${this.shopCards.map(id=>`<div class="card" style="animation:none;cursor:pointer" onclick="BM.buyShop('${id}')">${this.cardInner(id)}</div>`).join('')}</div>
        ${this.myShop?'<div style="color:var(--ink2)">Waiting for opponent…</div>':'<button class="btn btn-go" onclick="BM.shopReady()">Ready ▸</button>'}`;
    } else if(this.phase==='over'){
      const won=this.winner===this.side;body=`<div class="bm-status" style="font-size:1.1rem;color:${won?'var(--good)':'var(--bad)'}">${won?'🏆 VICTORY':'☠ DEFEAT'} — ${meW}–${foeW}</div>
        <div style="margin-top:12px"><button class="btn btn-go" onclick="BM.rematch()">↻ Rematch</button> <button class="btn btn-end" onclick="BM.leave()">Leave</button></div>`;
    } else if(this.phase==='left'){body=`<div class="bm-status" style="color:var(--bad)">Opponent left the battle.</div><button class="btn btn-go" onclick="BM.leave()">Back</button>`;}
    el.innerHTML=`<div style="text-align:center;padding-top:6px">${body}</div>`;game.show('bm');},
  deployGrid(){let h='';for(let r=0;r<this.R;r++)for(let c=0;c<this.C;c++){const cell=this.deploy.find(s=>cellsOf(s).some(([a,b])=>a===r&&b===c));h+=`<div class="cell ${cell?'ship':''}">${cell?'<div class="hull"></div>':''}</div>`;}return h;},
  foeGrid(){let h='';for(let r=0;r<this.R;r++)for(let c=0;c<this.C;c++){const t=this.foe.grid[r][c];let cls='cell';if(t.sunkx)cls+=' sunkx';else if(t.hit)cls+=' dmg';else if(t.shot)cls+=' miss';else cls+=' fog';const ev=(this.myTurn&&!this.waiting&&!t.shot)?`onclick="BM.fire(${r},${c})"`:'';h+=`<div class="${cls}" ${ev}></div>`;}return h;},
  myGrid(){let h='';for(let r=0;r<this.R;r++)for(let c=0;c<this.C;c++){const t=this.my.grid[r][c];let cls='cell',inner='';if(t.sunkx){cls+=' sunkx';inner='<div class="hull"></div>';}else if(t.hit){cls+=' shiphit';inner='<div class="hull"></div>';}else if(t.ship){cls+=' ship';inner='<div class="hull"></div>';}else if(t.shot)cls+=' miss';if(t.deflect)cls+=' deflect';h+=`<div class="${cls}">${inner}</div>`;}return h;},
  handHtml(){return this.hand.map((id,i)=>{const c=BM_CARDS[id];const can=this.myTurn&&!this.waiting&&c.cost<=this.energy;return `<div class="card ${can?'':'cant'}" onclick="BM.playCard(${i})">${this.cardInner(id)}</div>`;}).join('');},
  cardInner(id){const c=BM_CARDS[id];return `<div class="cost">${c.cost}</div><div class="cat cat-${c.cat}">${c.cat}</div><div class="art">${c.ic}</div><div class="nm">${c.name}</div><div class="ds">${c.ds}</div>`;},
};

/* ============ CLASSIC MODE (Phase C — each act boss is your rival) ============ */
const Classic={
  start(side,seed){this.side=side;this.foeSide=side==='a'?'b':'a';this.seed=seed;this.duelWins={a:0,b:0};this.atBoss=false;this.foeAtBoss=false;this.foeBossAct=0;this.inDuel=false;
    game.classicMode=true;game.doctrine=null;game._classicSeed=seed;game._mpHandler=m=>this.route(m);
    _seeded=mulberry32(hashStr('classic:'+seed+':act1'));
    game.admiral=ADMIRALS[0];game.ascension=0;game.dailyActive=false;game.orientation=(_seeded()<0.5?'portrait':'landscape');
    game.startRun();},
  route(m){if(['ready','sabotage','fire','result','endturn','roundover','shopdone','rematch'].indexOf(m.t)>=0)BM.onMsg(m);else this.onMsg(m);},
  onMsg(m){switch(m.t){
    case 'atboss':this.foeAtBoss=true;this.foeBossAct=m.act;if(this.atBoss&&this.curAct===m.act&&!this.inDuel)this.launchDuel(m.act);break;
    case 'left':if(!this.inDuel)game.toast&&game.toast('Your rival left the campaign.');break;
  }},
  bossDuel(act){this.curAct=act;this.atBoss=true;
    const s=document.getElementById('sheet');s.innerHTML=`<h2 style="color:var(--gold)">⚔️ ACT ${act} — RIVAL DUEL</h2><div class="desc">The act boss is your rival captain. Waiting for them to reach the Act ${act} boss…</div><div class="bm-status">Duels won — you ${this.duelWins[this.side]||0} · rival ${this.duelWins[this.foeSide]||0}</div>`;game.show('sheet');
    Net.send({t:'atboss',act});if(this.foeAtBoss&&this.foeBossAct===act)this.launchDuel(act);},
  launchDuel(act){this.inDuel=true;this.atBoss=false;this.foeAtBoss=false;BM.send=o=>Net.send(o);
    BM.start(this.side,{bestOf:1,noHandler:true,onEnd:w=>this.duelDone(act,w)});},
  duelDone(act,winner){this.inDuel=false;this.duelWins[winner]=(this.duelWins[winner]||0)+1;
    if(winner===this.side)game.toast&&game.toast('🏆 You won the Act '+act+' rival duel!');
    else{game.toast&&game.toast('You lost the duel — a hull is damaged.');game.damageFleet&&game.damageFleet(1);}
    if(act>=3)return this.matchOver();game.classicNextAct();},
  matchOver(){game.classicMode=false;const me=this.duelWins[this.side]||0,fo=this.duelWins[this.foeSide]||0;const won=me>fo;
    if(won){Meta.data.mpWins=(Meta.data.mpWins||0)+1;Meta.save();game.evalAchievements&&game.evalAchievements();}
    const m=document.getElementById('modal');m.innerHTML=`<h2 class="${won?'win':'lose'}">${won?'🏆 ADMIRAL OF THE FLEET':'☠ OUTMATCHED'}</h2><p>Rival boss-duels won: <b>${me}</b> — ${fo}.<br>${won?'You bested your rival across all three acts!':'Your rival won more boss duels.'}</p><button class="btn btn-go" onclick="Net.close();game.renderHome();game.show('title')">Back to title</button>`;
    document.getElementById('ovl').classList.add('show');Sound.win();},
};

/* ---- boot ---- */
initWater();
addEventListener('resize',()=>{if(game.phase==='placement')game.renderPlacement(false);if(game.map&&!document.getElementById('map').classList.contains('hidden'))game.renderMap();});
addEventListener('keydown',e=>{
  if(game.phase==='combat'){if(e.key>='1'&&e.key<='9'){const el=document.querySelectorAll('#hand .card')[+e.key-1];if(el)el.click();}if(e.key==='f'||e.key==='F'||e.key===' '){e.preventDefault();game.endTurn();}}
  if(game.phase==='placement'&&(e.key==='r'||e.key==='R'))game.randomizeFleet();
  if(game.phase==='placement'&&(e.key===' '||e.key==='Enter')){e.preventDefault();game.setSail();}
});
game.boot();
</script>
