<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DEAD RECKONING — Battleship Roguelike</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --ord:#ff5a3c;--son:#34c6ff;--man:#3ee08a;--dec:#ffc23c;--fla:#a98bff;--rep:#8f7dff;
    --gold:#ffcf45;--hit:#ff4646;--good:#5fe0b0;--bad:#ff7a78;
    --com:#9fc2dd;--rare:#5fb8ff;--forge:#3ee08a;--contra:#ff7a3c;--omega:#e05fff;
    --ink:#eaf4ff;--ink2:#9fc2dd;--ink3:#5d86a6;
    --card:#15324c;--cardlip:#0c2236;--line:#2a557c;--bg:#081826;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:clamp(13px,3.4vw,17px)}
  html,body{margin:0;height:100%;overflow-x:hidden}
  body{font-family:'Pixelify Sans',ui-rounded,system-ui,sans-serif;color:var(--ink);min-height:100%;position:relative;
    background:radial-gradient(1300px 700px at 50% -8%,#15506b,#0a2740 42%,#061726 100%);-webkit-font-smoothing:none;
    padding-bottom:env(safe-area-inset-bottom)}
  #water{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.9}
  #vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 120% at 50% 40%,transparent 55%,rgba(2,8,15,.55) 100%)}
  .frame{position:relative;z-index:2;width:100%;max-width:1120px;margin:0 auto;padding:12px;padding-top:max(12px,env(safe-area-inset-top))}
  .shake{animation:shake .32s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translate(-1px,0)}20%,80%{transform:translate(3px,-1px)}30%,50%,70%{transform:translate(-5px,1px)}40%,60%{transform:translate(5px,-2px)}}
  .hidden{display:none!important}
  button{font-family:inherit}
  .cell,.card,button,[role=button]{cursor:pointer}
  .cell:active,.card:active{transform:scale(.94);transition:transform .08s}
  button:active{opacity:.8}

  /* topbar */
  .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;
    padding-bottom:7px;border-bottom:2px solid rgba(52,198,255,.2)}
  .brand h1{margin:0;font-family:'Press Start 2P',monospace;font-size:.85rem;letter-spacing:1px;color:#eaf4ff;text-shadow:0 2px 0 #0a2236,0 0 16px rgba(52,198,255,.5)}
  .brand .sub{font-size:.72rem;color:var(--son);margin-top:3px}
  .stats{display:flex;gap:5px;flex-wrap:wrap}
  .stat{background:rgba(8,26,42,.7);border:2px solid var(--line);border-radius:9px;padding:4px 9px;text-align:center;min-width:48px;box-shadow:0 3px 0 rgba(0,0,0,.35)}
  .stat .k{font-size:.5rem;letter-spacing:1px;color:var(--ink3);text-transform:uppercase}
  .stat .v{font-size:.95rem;font-weight:700;line-height:1.1}
  .stat .v.g{color:var(--gold)}
  .snd{display:flex;gap:4px}
  .snd span{background:rgba(8,26,42,.7);border:2px solid var(--line);border-radius:8px;padding:2px 7px;font-size:.8rem;cursor:pointer}
  .relics{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px;min-height:30px}
  .relic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:rgba(8,26,42,.8);border:2px solid var(--gold);cursor:help;position:relative;box-shadow:0 2px 0 rgba(0,0,0,.4)}
  .relic .tip{display:none;position:absolute;bottom:36px;left:50%;transform:translateX(-50%);width:150px;background:#0a2030;border:2px solid var(--line);border-radius:8px;padding:7px 9px;font-size:.7rem;color:var(--ink2);z-index:50;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.5)}
  .relic .tip b{color:var(--gold)}
  .relic:hover .tip{display:block}
  .relics .empty{font-size:.72rem;color:var(--ink3)}

  .btn{cursor:pointer;border-radius:11px;font-size:.92rem;font-weight:700;letter-spacing:.5px;border:none;padding:9px 18px;transition:transform .08s,filter .1s;text-transform:uppercase;touch-action:manipulation}
  .btn:active{transform:translateY(3px)}
  .btn-end{background:#1d4a6b;color:#cfeaff;box-shadow:0 4px 0 #0e2c43}.btn-end:hover{filter:brightness(1.15)}
  .btn-fire{background:linear-gradient(180deg,#ff6b52,#e23a28);color:#fff;box-shadow:0 4px 0 #8d1d12}.btn-fire:hover{filter:brightness(1.1)}
  .btn-go{background:linear-gradient(180deg,#46e39a,#1fae6e);color:#06301f;box-shadow:0 4px 0 #0c6b41;font-size:1rem;padding:11px 24px;min-height:48px}.btn-go:hover{filter:brightness(1.08)}
  .btn-gold{background:linear-gradient(180deg,#ffe27a,#e0a319);color:#4a2c00;box-shadow:0 4px 0 #8a5e00}
  .btn-sm{font-size:.75rem;padding:7px 12px}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}

  /* TITLE */
  #title{text-align:center;padding:8px 0 24px}
  #title .big{font-family:'Press Start 2P',monospace;font-size:clamp(20px,6vw,30px);letter-spacing:2px;text-shadow:0 4px 0 #0a2236,0 0 26px rgba(52,198,255,.6);margin:14px 0 6px;line-height:1.5}
  #title .tag{color:var(--son);font-size:.95rem;margin-bottom:8px}
  #title .pick{font-size:.85rem;color:var(--ink2);margin:16px 0 10px;letter-spacing:1px}
  .admirals{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .adm{width:min(215px,90vw);background:linear-gradient(180deg,rgba(16,44,66,.85),rgba(7,24,38,.92));border:2px solid var(--line);border-radius:16px;padding:15px;cursor:pointer;text-align:left;transition:transform .1s,border-color .1s,box-shadow .1s;box-shadow:0 6px 0 rgba(0,0,0,.3)}
  .adm:hover{transform:translateY(-6px);border-color:var(--son);box-shadow:0 14px 26px rgba(0,0,0,.5)}
  .adm.locked{opacity:.5;cursor:not-allowed}
  .adm .face{font-size:2.4rem;text-align:center;margin-bottom:4px}
  .adm .an{font-family:'Press Start 2P',monospace;font-size:.7rem;color:#fff;margin-bottom:5px;line-height:1.4}
  .adm .arch{font-size:.78rem;color:var(--gold);margin-bottom:7px}
  .adm .ap{font-size:.78rem;color:var(--ink2);line-height:1.45}
  .adm .lk{font-size:.7rem;color:var(--son);margin-top:7px}

  /* MAP */
  #map{display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,rgba(10,38,58,.5),rgba(5,22,36,.7));border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;width:100%;max-width:100vw;overflow:hidden}
  #map .mt{font-family:'Press Start 2P',monospace;font-size:.8rem;color:var(--son);margin-bottom:4px;text-align:center}
  #map .ms{font-size:.78rem;color:var(--ink2);margin-bottom:10px;text-align:center}
  #mapcanvas{position:relative;width:100%;max-width:560px;overflow-x:hidden;overflow-y:auto}
  .mnode{position:absolute;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(8,26,42,.9);border:2px solid var(--line);transform:translate(-50%,-50%);transition:transform .1s,box-shadow .12s;z-index:2}
  .mnode.done{opacity:.4;border-color:#2a3a4a}
  .mnode.reach{cursor:pointer;border-color:var(--gold);box-shadow:0 0 16px rgba(255,207,69,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.12)}}
  .mnode.cur{border-color:var(--son);box-shadow:0 0 18px rgba(52,198,255,.7)}
  .mnode .lbl{position:absolute;top:46px;font-size:.5rem;color:var(--ink3);white-space:nowrap;letter-spacing:.5px}

  /* COMBAT */
  .grids{display:flex;flex-direction:column;gap:12px;margin-bottom:10px;width:100%}
  @media(min-width:760px){.grids{flex-direction:row}}
  .panel{flex:1;min-width:0;background:linear-gradient(180deg,rgba(10,38,58,.55),rgba(5,22,36,.7));border:2px solid var(--line);border-radius:16px;padding:10px;position:relative;overflow:hidden;box-shadow:0 6px 0 rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06)}
  .panel-label{font-size:.72rem;letter-spacing:1px;color:var(--ink2);text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:6px}
  .panel-label .tag{color:var(--son);font-size:.72rem;text-align:right}
  .board{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:2px;width:100%;position:relative;z-index:2}
  .board.expand{animation:expand .6s cubic-bezier(.2,1,.4,1)}
  @keyframes expand{0%{transform:scale(.82);opacity:.3}100%{transform:scale(1);opacity:1}}
  .cell{aspect-ratio:1;min-width:0;width:100%;border-radius:4px;border:1.5px solid rgba(52,198,255,.18);background:rgba(7,26,42,.45);display:flex;align-items:center;justify-content:center;transition:transform .1s,background .12s,box-shadow .12s;position:relative;overflow:visible;touch-action:manipulation}
  .cell::after{content:'';position:absolute;inset:-3px}
  .enemy .cell{cursor:crosshair}
  .enemy .cell:hover{background:rgba(52,198,255,.22);box-shadow:inset 0 0 0 2px var(--son),0 0 10px rgba(52,198,255,.5);z-index:3}
  .cell.fog{background:rgba(6,20,33,.66)}
  .cell.miss{background:rgba(10,30,46,.7)}
  .cell.miss::before{content:'';width:24%;height:24%;border-radius:50%;background:#2f5878;box-shadow:0 0 5px #1a3148}
  .cell.dmg{background:radial-gradient(circle at 50% 45%,#ff8a5c,#e23a28);border-color:#8d1d12;box-shadow:0 0 12px rgba(255,90,60,.7)}
  .cell.dmg::before{content:'';width:34%;height:34%;border-radius:50%;background:#2a0606;box-shadow:0 0 4px #000 inset}
  .cell.sunkx{background:linear-gradient(180deg,#7a1f1f,#4a0f0f);border-color:#2a0808}
  .cell.ship{background:linear-gradient(180deg,#3f78ac,#235d8f);border-color:#7fc0ee;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .cell.shiphit{background:radial-gradient(circle at 50% 45%,#ff8a5c,#c5301f);border-color:#8d1d12}
  .cell.sonar{background:rgba(62,224,138,.16);border-color:rgba(62,224,138,.55)}
  .cell.sonarship{background:rgba(62,224,138,.4);border-color:#7dffc2;box-shadow:0 0 10px rgba(62,224,138,.6);animation:sonarPing .5s ease-out}
  @keyframes sonarPing{0%{transform:scale(.6);opacity:.2}100%{transform:scale(1);opacity:1}}
  .cell.deflect{background:rgba(255,194,60,.3);border-color:var(--dec)}
  .cell.ghost{background:rgba(160,140,255,.18);border-color:rgba(160,140,255,.6);box-shadow:0 0 8px rgba(160,140,255,.4)}
  .cell.ghost::before{content:'👻';font-size:.7em;opacity:.7}
  .cell.aimprev{box-shadow:inset 0 0 0 2px var(--dec)}
  .hull{position:absolute;inset:14%;background:linear-gradient(180deg,#6a7b88,#33424f);box-shadow:inset 0 1px 0 rgba(255,255,255,.3);z-index:1}
  .cell.shiphit .hull{filter:brightness(.8) saturate(.6)}
  .cap-l{border-top-left-radius:50%;border-bottom-left-radius:50%}.cap-r{border-top-right-radius:50%;border-bottom-right-radius:50%}
  .cap-t{border-top-left-radius:50%;border-top-right-radius:50%}.cap-b{border-bottom-left-radius:50%;border-bottom-right-radius:50%}
  .turret{position:absolute;width:26%;height:26%;max-width:6px;max-height:6px;border-radius:50%;background:#0c1a26;z-index:2}
  .fire{position:absolute;left:50%;top:34%;width:34%;height:42%;max-width:11px;max-height:15px;transform:translate(-50%,-50%);background:radial-gradient(circle at 50% 70%,#fff2a8,#ff7a2a 45%,#e23a28 75%,transparent);border-radius:50% 50% 45% 45%;z-index:4;animation:flick .5s ease-in-out infinite alternate;pointer-events:none}
  @keyframes flick{0%{transform:translate(-50%,-50%) scale(.85) rotate(-4deg);opacity:.85}100%{transform:translate(-55%,-60%) scale(1.15) rotate(4deg);opacity:1}}
  .cell.pop{animation:cellpop .3s ease-out}
  @keyframes cellpop{0%{transform:scale(.4)}55%{transform:scale(1.3)}100%{transform:scale(1)}}
  .cell.reveal{animation:reveal .5s ease-out}
  @keyframes reveal{0%{transform:scale(.5);filter:brightness(2)}100%{transform:scale(1);filter:brightness(1)}}

  /* enemy roster (fog ???) */
  .roster{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;position:relative;z-index:2}
  .rchip{font-size:.62rem;padding:2px 7px;border-radius:9px;background:#0a2030;border:1px solid var(--line);color:var(--ink3);letter-spacing:.5px}
  .rchip.sunk{background:#4a0f0f;border-color:#8d1d12;color:#f08a88}
  .fleet{display:flex;flex-direction:column;gap:5px;margin-top:8px;position:relative;z-index:2}
  .fitem{font-size:.72rem;color:var(--ink2);display:flex;align-items:center;gap:6px}
  .fbar{flex:1;height:6px;border-radius:4px;background:#08202f;overflow:hidden}
  .ffill{height:100%;background:linear-gradient(90deg,#34c6ff,#8fe6ff);transition:width .3s}
  .badge{font-size:.5rem;padding:2px 6px;border-radius:9px;letter-spacing:.5px;font-weight:700}
  .b-ok{background:#0e3a2e;color:#5fe0b0}.b-dmg{background:#4a3306;color:#f2c46a}.b-sunk{background:#4a0f0f;color:#f08a88}.b-ghost{background:#2a2350;color:#b9aef5}

  /* placement */
  .place-wrap{display:flex;flex-direction:column;align-items:center;gap:11px;background:linear-gradient(180deg,rgba(10,38,58,.5),rgba(5,22,36,.7));border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
  .place-title{font-family:'Press Start 2P',monospace;font-size:.72rem;color:var(--son);text-align:center;line-height:1.5}
  .place-sub{font-size:.78rem;color:var(--ink2);text-align:center;margin-top:-2px}
  #place-grid{position:relative;touch-action:none;user-select:none}
  #place-grid.expand{animation:expand .6s cubic-bezier(.2,1,.4,1)}
  .pg-cell{position:absolute;border-radius:4px;border:1.5px solid rgba(52,198,255,.18);background:rgba(7,26,42,.4)}
  .pship{position:absolute;border-radius:8px;cursor:grab;z-index:5;background:linear-gradient(180deg,#3f78ac,#235d8f);border:2px solid #7fc0ee;box-shadow:inset 0 2px 0 rgba(255,255,255,.3),0 4px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#cfeeff;font-size:.66rem;touch-action:none;overflow:hidden}
  .pship:hover{filter:brightness(1.12)}
  .pship.dragging{cursor:grabbing;z-index:9;filter:brightness(1.2)}
  .pship.bad{background:linear-gradient(180deg,#c5483f,#8d1d12);border-color:#ffb3ad}
  .pship.dmgd{background:linear-gradient(180deg,#7a5a30,#5a3d18);border-color:#e8b86a}
  .pship .rot{position:absolute;top:1px;right:3px;font-size:.6rem;opacity:.7}
  .place-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  /* hand */
  .handwrap{margin-bottom:8px}
  .handlbl{font-size:.72rem;letter-spacing:1px;color:var(--ink2);text-transform:uppercase;margin-bottom:5px;text-align:center}
  .selbanner{display:none;text-align:center;font-size:.78rem;color:var(--dec);background:rgba(255,194,60,.12);border:1px solid var(--dec);border-radius:8px;padding:5px;margin-bottom:6px}
  .selbanner.show{display:block}
  .hand{display:flex;gap:9px;justify-content:flex-start;overflow-x:auto;overflow-y:visible;padding:10px 8px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .hand::-webkit-scrollbar{display:none}
  @media(min-width:760px){.hand{justify-content:center;flex-wrap:wrap;overflow-x:visible}}
  .card{flex-shrink:0;width:min(118px,32vw);min-width:104px;height:160px;border-radius:13px;position:relative;background:linear-gradient(180deg,var(--card),var(--cardlip));border:2px solid var(--line);padding:8px;box-shadow:0 7px 0 rgba(0,0,0,.35),inset 0 2px 0 rgba(255,255,255,.08);scroll-snap-align:start;animation:bob 3.2s ease-in-out infinite;will-change:transform}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-6px) rotate(1deg)}}
  .card:hover{animation:none;transform:translateY(-12px) scale(1.07);z-index:20;box-shadow:0 16px 24px rgba(0,0,0,.5)}
  .card.armed{border-color:var(--dec);box-shadow:0 7px 0 rgba(0,0,0,.35),0 0 0 3px var(--dec),0 0 20px rgba(255,194,60,.5);animation:none;transform:translateY(-8px) scale(1.04)}
  .card.cant{filter:grayscale(.6) brightness(.7)}
  .card.deal{animation:dealIn .42s cubic-bezier(.2,1.2,.4,1) both}
  @keyframes dealIn{0%{transform:translateY(56px) rotate(-12deg) scale(.7);opacity:0}100%{transform:translateY(0) rotate(-1deg) scale(1);opacity:1}}
  .card.spent{animation:spend .32s ease-in forwards}
  @keyframes spend{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-80px) scale(.5) rotate(14deg);opacity:0}}
  .card .cat{font-size:.55rem;letter-spacing:1px;font-weight:700;text-transform:uppercase}
  .card .art{height:42px;margin:4px 0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:rgba(0,0,0,.25);border:1.5px solid rgba(255,255,255,.08)}
  .card .nm{font-size:.82rem;font-weight:700;color:#fff;line-height:1.05;margin-bottom:3px}
  .card .ds{font-size:.6rem;color:var(--ink2);line-height:1.22}
  .card .cost{position:absolute;top:-9px;left:-9px;width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe27a,#e0a319);border:2px solid #fff3c4;color:#4a2c00;font-size:.85rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 6px rgba(0,0,0,.4);z-index:5}
  .card .rar{position:absolute;bottom:4px;right:6px;font-size:.46rem;letter-spacing:.5px;text-transform:uppercase;font-weight:700}
  .cat-ORDNANCE{color:var(--ord)}.cat-SONAR{color:var(--son)}.cat-MANEUVER{color:var(--man)}.cat-DECOY{color:var(--dec)}.cat-FLAGSHIP{color:var(--fla)}.cat-REPAIR{color:var(--rep)}
  .r-common{color:var(--com)}.r-rare{color:var(--rare)}.r-forge{color:var(--forge)}.r-contra{color:var(--contra)}.r-omega{color:var(--omega)}

  /* action bar (two-zone HUD) */
  .actionbar{position:sticky;bottom:0;z-index:15;display:flex;gap:7px;flex-wrap:wrap;align-items:center;justify-content:center;
    background:rgba(5,18,30,.94);border:2px solid var(--line);border-radius:13px;padding:8px;margin-bottom:8px;
    box-shadow:0 -4px 16px rgba(0,0,0,.4);padding-bottom:max(8px,env(safe-area-inset-bottom))}
  .chip{background:rgba(8,26,42,.7);border:2px solid var(--line);border-radius:9px;padding:5px 9px;font-size:.72rem;color:var(--ink2);display:flex;align-items:center;gap:5px}
  .chip b{color:var(--ink);font-size:.9rem}
  .score-hud{background:linear-gradient(180deg,#13344c,#0a2236);border:2px solid var(--gold);border-radius:10px;padding:5px 11px;display:flex;align-items:center;gap:6px;font-size:.78rem}
  .score-hud .chips{color:var(--son);font-weight:700;font-size:1rem}.score-hud .x{color:var(--ink3)}.score-hud .mult{color:var(--ord);font-weight:700;font-size:1rem}
  .score-hud.bump{animation:bump .25s ease}@keyframes bump{50%{transform:scale(1.13)}}
  .edots{display:flex;gap:3px}
  .dot{width:12px;height:12px;border-radius:50%;background:#0c2236;border:2px solid #234;transition:.2s}
  .dot.on{background:radial-gradient(circle at 35% 30%,#bff0ff,#2aa8e6);border-color:#bff0ff;box-shadow:0 0 8px #34c6ff}
  .end-turn-btn{min-height:46px;padding:0 20px;font-size:.95rem;font-weight:700;border-radius:10px;background:#1d4a6b;color:#cfeaff;border:none;box-shadow:0 4px 0 #0e2c43;position:relative;overflow:hidden;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;touch-action:manipulation}
  .end-turn-btn:active{transform:translateY(3px)}
  .end-turn-btn.auto::after{content:'';position:absolute;bottom:0;left:0;height:4px;width:100%;background:var(--dec);opacity:.7;animation:drain 1.2s linear forwards;transform-origin:left}
  @keyframes drain{from{transform:scaleX(1)}to{transform:scaleX(0)}}

  .log{background:rgba(4,16,26,.7);border:2px solid var(--line);border-radius:11px;padding:8px 11px;font-size:.72rem;color:var(--ink2);height:74px;overflow-y:auto;line-height:1.6;margin-bottom:8px}
  .log .ln{opacity:.5}.log .ln:last-child{opacity:1;color:var(--ink)}
  .log .gd{color:var(--good)}.log .bd{color:var(--bad)}.log .am{color:var(--dec)}
  .help{font-size:.72rem;color:var(--ink3);text-align:center;margin-top:6px;position:relative;z-index:2}
  .kbd{font-size:.64rem;color:var(--ink3);text-align:center;margin-top:4px}

<body>

<div class="frame" id="frame">

  <div id="bm" class="hidden"></div>
</div>

<div class="ovl" id="ovl"><div class="modal" id="modal"></div></div>

const _origRandom=Math.random.bind(Math);
let _seeded=null;
Math.random=function(){return _seeded?_seeded():_origRandom();};
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function todaySeed(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

/* AUDIO */
const Sound={ctx:null,muted:false,
  init(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}},
  blip(f,d,t,v){if(this.muted||!this.ctx)return;const c=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,c);g.gain.setValueAtTime(v||.08,c);g.gain.exponentialRampToValueAtTime(.0001,c+d);o.connect(g);g.connect(this.ctx.destination);o.start(c);o.stop(c+d);},
  fire(){this.blip(180,.12,'sawtooth',.05);},miss(){this.blip(120,.16,'sine',.05);},
  hit(){this.blip(95,.18,'square',.09);setTimeout(()=>this.blip(72,.14,'square',.07),55);},
  sink(){[300,240,180,120].forEach((f,i)=>setTimeout(()=>this.blip(f,.18,'square',.09),i*70));},
  card(){this.blip(520,.07,'triangle',.05);},draw(){this.blip(420,.05,'triangle',.04);},
  coin(){this.blip(880,.06,'square',.05);setTimeout(()=>this.blip(1180,.08,'square',.05),50);},
  win(){[400,520,660,880].forEach((f,i)=>setTimeout(()=>this.blip(f,.2,'triangle',.08),i*110));},
  lose(){[300,240,180,120,90].forEach((f,i)=>setTimeout(()=>this.blip(f,.25,'sawtooth',.08),i*120));},
  expand(){[200,300,440].forEach((f,i)=>setTimeout(()=>this.blip(f,.3,'sine',.05),i*90));},
};
const Music={on:true,timer:null,i:0,scale:[174.6,196,233.1,261.6,293.7,349.2,392,233.1],
  start(){if(this.timer)return;this.timer=setInterval(()=>this.step(),760);},
  step(){if(!this.on||Sound.muted||!Sound.ctx)return;const n=this.scale[this.i%this.scale.length];this.low(n,1.1,.02);if(this.i%4===0)this.low(n/2,1.4,.028);this.i++;},
  low(f,d,v){const c=Sound.ctx.currentTime,o=Sound.ctx.createOscillator(),g=Sound.ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(f,c);g.gain.setValueAtTime(0,c);g.gain.linearRampToValueAtTime(v,c+.1);g.gain.exponentialRampToValueAtTime(.0001,c+d);o.connect(g);g.connect(Sound.ctx.destination);o.start(c);o.stop(c+d);},
};

/* WATER */
function initWater(){const cv=document.getElementById('water'),ctx=cv.getContext('2d');let W,H,dpr;
  function rs(){dpr=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*dpr;H=cv.height=innerHeight*dpr;}rs();addEventListener('resize',rs);
  let t=0;(function frame(){t+=.012;ctx.clearRect(0,0,W,H);const bands=9;
    for(let i=0;i<bands;i++){const y0=H*(i/bands),amp=18*dpr+i*2*dpr,k=.006/dpr,hue=200+i*4;ctx.beginPath();ctx.moveTo(0,y0);
      for(let x=0;x<=W;x+=14*dpr){const y=y0+Math.sin(x*k+t*(1+i*.12)+i)*amp+Math.sin(x*k*2.3-t*.7)*amp*.4;ctx.lineTo(x,y);}
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fillStyle=`hsla(${hue},70%,${22+i*2}%,${.05+.018*i})`;ctx.fill();}
    requestAnimationFrame(frame);})();}

  /* ---------- GRID SIZING (Sprint 1) ---------- */
  gridSize(boss){
    if(this.act===1){
      if(boss)return {r:7,c:6};
      if(this.actBattle<=1)return this.orientation==='portrait'?{r:5,c:3}:{r:3,c:5};
      return {r:5,c:5};
    }
    if(this.act===2){if(boss)return {r:10,c:10};return this.actBattle===0?{r:8,c:8}:{r:10,c:10};}
    if(boss)return {r:14,c:14};return {r:12,c:12};
  },

  /* ---------- BATTLE SETUP ---------- */
  startBattle(kind){
    if(this.classicMode&&kind==='boss'){Classic.bossDuel(this.act);return;}
    if(this.admiral.id==='blacktide'){this.battleKind=kind;Pirate.start(kind);return;}
    this.battleKind=kind;const boss=kind==='boss';
    if(boss){const pool=ACT_BOSSES[this.act]||['Carrion Fleet'];const pick=pool[Math.floor(Math.random()*pool.length)];this.faction=FACTIONS.find(x=>x.name===pick)||FACTIONS.find(x=>x.name==='Carrion Fleet');}
    else{const pool=FACTIONS.filter(x=>x.ai!=='adaptive');this.faction=pool[Math.floor(Math.random()*pool.length)];}
    const dims=this.gridSize(boss);this.rows=dims.r;this.cols=dims.c;
    const variant=boss?'boss':kind;const A=this.ascension||0;
    const enemyDefs=enemyFleetFor(this.rows,this.cols,variant);
    if(A>=2&&Math.max(this.rows,this.cols)>=2)enemyDefs.push({name:'Destroyer',len:2}); // A2: denser enemy fleets
    this.enemy=bakeBoard(placeFleet(enemyDefs,this.rows,this.cols),this.rows,this.cols);
    this.enemyShots=(boss?2:kind==='elite'?2:1)+(this.act-1>=2?1:0)+(A>=1?1:0)+((A>=4&&(boss||kind==='elite'))?1:0)+(A>=5?1:0);
    this.enemyAbilities=(kind==='elite'||boss);
    this.hardMode=(A>=3); this.ascEscalate=(A>=5); // A3: your board fogs · A5: every faction escalates
    this.adaptiveBoost=0;this.refog=(boss&&this.rows>=14);
    this.bossMech=boss?((BOSS_SCENE[this.faction.name]||{}).mech||null):null;if(this.bossMech==='refog')this.refog=true;this.bossTick=0;
    this.specialsList=assignSpecials(this.enemy,kind,this.act);
    // deploy: place persistent (surviving) fleet on this grid
    this.deploy=this.fleet.filter(s=>!s.sunk).map(s=>({name:s.name,len:s.len,hits:s.hits,sunk:false,src:s}));
    placeDeploy(this.deploy,this.rows,this.cols);
    this.phase='placement';
    document.getElementById('place-head').textContent=(boss?'⚠ BOSS — ':kind==='elite'?'☠ ELITE — ':kind==='scout'?'🛶 SCOUT — ':'')+`${this.faction.name} · ${this.cols}×${this.rows}`;
    this.renderPlacement(true);this.renderTop();
    if(boss&&BOSS_SCENE[this.faction.name])showCutscene(BOSS_SCENE[this.faction.name],()=>this.show('place'));else this.show('place');
  },
  randomizeFleet(){Sound.card();placeDeploy(this.deploy,this.rows,this.cols);this.renderPlacement(false);},
  renderPlacement(expand){
    const wrap=document.getElementById('place-grid');
    const maxW=Math.min(440,window.innerWidth-44);const cell=Math.max(26,Math.min(60,maxW/this.cols));
    wrap.style.width=(this.cols*cell)+'px';wrap.style.height=(this.rows*cell)+'px';
    let html='';
    for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)html+=`<div class="pg-cell" style="left:${c*cell}px;top:${r*cell}px;width:${cell-3}px;height:${cell-3}px"></div>`;
    this.deploy.forEach((s,i)=>{const w=(s.horiz?s.len:1)*cell-4,h=(s.horiz?1:s.len)*cell-4;
      html+=`<div class="pship ${s.hits>0?'dmgd':''}" data-i="${i}" style="left:${s.c*cell+2}px;top:${s.r*cell+2}px;width:${w}px;height:${h}px"><span class="rot">↻</span>${s.name[0]}${s.len}${s.hits>0?' ('+(s.len-s.hits)+')':''}</div>`;});

  },
  dragStart(e){e.preventDefault();const wrap=document.getElementById('place-grid'),cell=wrap._cell;const i=+e.currentTarget.dataset.i,ship=this.deploy[i];
    const rect=wrap.getBoundingClientRect();const offC=Math.floor((e.clientX-rect.left)/cell)-ship.c,offR=Math.floor((e.clientY-rect.top)/cell)-ship.r;
    const prev={r:ship.r,c:ship.c,horiz:ship.horiz};const el=e.currentTarget;el.classList.add('dragging');let moved=false;
    const move=ev=>{const nc=Math.floor((ev.clientX-rect.left)/cell)-offC,nr=Math.floor((ev.clientY-rect.top)/cell)-offR;
      if(nc!==prev.c||nr!==prev.r)moved=true;ship.c=clamp(nc,0,this.cols-(ship.horiz?ship.len:1));ship.r=clamp(nr,0,this.rows-(ship.horiz?1:ship.len));
      el.style.left=(ship.c*cell+2)+'px';el.style.top=(ship.r*cell+2)+'px';el.classList.toggle('bad',!this.valid(i));};
    const up=()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);el.classList.remove('dragging');
      if(!moved){const nh=!ship.horiz;if(this.fits(ship,ship.r,ship.c,nh)){ship.horiz=nh;ship.c=clamp(ship.c,0,this.cols-(ship.horiz?ship.len:1));ship.r=clamp(ship.r,0,this.rows-(ship.horiz?1:ship.len));if(!this.valid(i)){ship.r=prev.r;ship.c=prev.c;ship.horiz=prev.horiz;}else Sound.card();}}
      else if(!this.valid(i)){ship.r=prev.r;ship.c=prev.c;ship.horiz=prev.horiz;}else Sound.draw();this.renderPlacement(false);};
    document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);},
  fits(s,r,c,h){const len=s.len;if(h)return c+len<=this.cols&&r<this.rows;return r+len<=this.rows&&c<this.cols;},
  valid(idx){const s=this.deploy[idx];const cells=cellsOf(s);for(const[r,c]of cells)if(r<0||c<0||r>=this.rows||c>=this.cols)return false;
    const occ=new Set();this.deploy.forEach((o,j)=>{if(j!==idx)cellsOf(o).forEach(([r,c])=>occ.add(r+','+c));});return cells.every(([r,c])=>!occ.has(r+','+c));},

  setSail(){
    Sound.win();
    this.player=bakeFromDeploy(this.deploy,this.rows,this.cols);
    this.turn=1;for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++)this.player.grid[r][c].seen=1;
    this.ghosts=[];this.phase='combat';
    this.drawPile=shuffle(this.deck.slice());this.discard=[];this.hand=[];this.ai={targets:[]};
    this.maxEnergy=2;this.handSize=5;

    const alive=this.player.ships;

    if(alive.find(s=>s.name==='Cruiser'))this.maxEnergy++;

    this.ironHull=0;this.evade=false;this.evadeChance=0.5;this.decoyWaste=0;this.smoke=0;this.overkill=false;this.overkillMult=2;this.chain=false;this.chainAmt=1;this.invis=0;this.enemyBonusShot=0;
    this.weather=WEATHERS[Math.floor(Math.random()*WEATHERS.length)];

  /* ---------- TURNS ---------- */
  startTurn(first){
    this.clearAuto();
    if(!first&&this.turn>1&&this.turn%4===1){this.weather=WEATHERS[Math.floor(Math.random()*WEATHERS.length)];this.log('The sea shifts: '+this.weather.ic+' <b>'+this.weather.name+'</b>.');}
    this.energy=this.maxEnergy;this.shots=1+this.permShot+(this.doctrine==='arsenal'?1:0);this.armed=null;this.targeting=null;this.overkill=false;this.chain=false;this.reactorMult=0;this.cardsThisTurn=0;this.fired=false;
    if(this.hasRelic('chest'))this.energy+=1;
    if(first&&this.hasRelic('drum'))this.shots+=1;
    if(this.player.ships.find(s=>s.name==='Submarine'&&!s.sunk))this.scout(1,'Submarine sonar');
    if(this.hasRelic('kraken'))this.scout(1,"Kraken's Eye");
    if(this.refog)this.doRefog();
    // expire ghosts
    if(this.ghosts){this.ghosts.forEach(g=>{if(g.turns>0)g.turns--;});this.ghosts=this.ghosts.filter(g=>g.turns!==0);}
    while(this.hand.length<this.handSize){if(this.drawPile.length===0){if(this.discard.length===0)break;this.drawPile=shuffle(this.discard);this.discard=[];}this.hand.push(this.drawPile.pop());}
    this.dealAnim=true;if(!first)this.log('— New turn. Energy & shots restored.');setTimeout(()=>Sound.draw(),60);
  },
  revealAt(r,c){const t=this.enemy.grid[r]&&this.enemy.grid[r][c];if(!t||t.shot)return false;const hull=!!(t.ship&&!(t.shipRef&&t.shipRef.kind==='sub'));t.sonar=hull?'ship':'empty';t.seen=this.turn;return hull;},
  scout(n,src){let done=0;const cells=[];this.enemy.ships.forEach(s=>{if(s.kind==='sub')return;s.cells.forEach(([r,c])=>{const t=this.enemy.grid[r][c];if(!t.shot&&t.sonar!=='ship')cells.push([r,c]);});});
    shuffle(cells);for(const[r,c]of cells){if(done>=n)break;this.enemy.grid[r][c].sonar='ship';this.enemy.grid[r][c].seen=this.turn||0;done++;}
    if(done)this.log(`<span class="gd">${src}</span> reveals a hull contact.`);},
  doRefog(){let n=0;for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const t=this.enemy.grid[r][c];
    if(t.shot&&!t.hit&&(this.turn-(t.seen||0))>=4){t.shot=false;n++;}if(t.sonar&&!t.hit&&(this.turn-(t.seen||0))>=4)t.sonar=null;}
    if(n)this.log('<span class="am">🌫️ The fog rolls back in</span> — unwatched waters return to unknown.');},

  /* ---------- CARDS ---------- */
  playCard(idx,el){
    this.clearAuto();
    const c=this.hand[idx];if(!c)return;let cost=c.cost;
    if(this.fired){this.flash('Turn over — you already fired this turn.','am');Sound.miss();return;}
    if(this.admiral.id==='silas'&&c.cat==='DECOY')cost=0;
    if(cost>this.energy){this.flash(`Not enough energy for ${c.name}.`,'bd');Sound.miss();return;}
    if(c.cat==='SONAR')this.usedSonar=true;
    this.cardCounts[c.id]=(this.cardCounts[c.id]||0)+1;
    if(c.kind==='target'){this.targeting={idx,card:c,cost};this.setHelp(c.id==='widescan'?'WIDE SCAN — tap a row to reveal it.':'SONAR PING — tap to scan a 3×3.');this.banner(c.name+' — tap the enemy grid');Sound.card();this.render();return;}
    this.cardsThisTurn++;this.stats.cardsPlayed++;
    if(this.hasRelic('reactor'))this.mult+=0.3;
    if(c.kind==='arm'){this.armed={idx,card:c};this.energy-=cost;Sound.card();if(el)el.classList.add('spent');this.banner(c.name+' loaded — tap to fire');setTimeout(()=>{this.removeHand(idx);this.render();},200);this.setHelp(`${c.name} loaded — now fire!`);this.log(`Loaded <b>${c.name}</b>.`);this.bump();return;}
    this.energy-=cost;Sound.card();
    if(c.id&&c.id.indexOf('sig_')===0){this.log(`Unleashing <b>${c.name}</b>…`);this.playSignature(c);if(el)el.classList.add('spent');setTimeout(()=>{this.removeHand(idx);this.render();},200);this.bump();return;}
    this.resolveInstant(c);if(this.admiral.id==='silas'&&c.cat==='DECOY')this.ironHull+=1;
    if(el)el.classList.add('spent');setTimeout(()=>{this.removeHand(idx);this.render();this.checkAuto();},200);this.bump();
  },
  playSignature(c){showCutscene(c,()=>{this.sigEffect(c);this.render();if(this.enemy.alive>0)this.checkAuto();});},
  sigEffect(c){switch(c.id){
    case 'sig_voss':{this.log('<span class="am">⚓ FULL BROADSIDE!</span>');for(let cc=0;cc<this.cols;cc++)if(!this.enemy.grid[0][cc].shot)this.fireOne(0,cc);if(this.enemy.alive<=0)return this.victory();break;}
    case 'sig_kael':{this.shots+=2;const sm=this.player.ships.filter(s=>!s.sunk).sort((a,b)=>a.len-b.len)[0];
      if(sm){const cell=sm.cells.find(([r,cc])=>!this.player.grid[r][cc].hit);if(cell){const[r,cc]=cell;this.player.grid[r][cc].hit=true;this.player.grid[r][cc].shot=true;sm.hits++;if(sm.hits>=sm.len){sm.sunk=true;sm.cells.forEach(([rr,c2])=>this.player.grid[rr][c2].sunkx=true);this.player.alive--;}if(this.player.sync)this.player.sync();}}
      this.log('<span class="am">🔥 INTO THE FIRE — +2 shots; your smallest hull takes a hit.</span>');break;}
    case 'sig_silas':{this.invis=3;this.log('<span class="gd">👻 DEAD MAN’S COURSE — your fleet is invisible for 3 enemy turns.</span>');break;}
    case 'sig_yara':{this.nuclear();break;}
  }},
  nuclear(){const R=Math.min(4,this.rows),C=Math.min(4,this.cols);let best=-1,br=0,bc=0;
    for(let r=0;r<=this.rows-R;r++)for(let c=0;c<=this.cols-C;c++){let n=0;for(let dr=0;dr<R;dr++)for(let dc=0;dc<C;dc++){const t=this.enemy.grid[r+dr][c+dc];if(t.ship&&!t.shot)n++;}if(n>best){best=n;br=r;bc=c;}}
    this.log('<span class="am">💥 NUCLEAR OPTION — the sea turns orange.</span>');
    for(let dr=0;dr<R;dr++)for(let dc=0;dc<C;dc++){const rr=br+dr,cc=bc+dc;if(rr<this.rows&&cc<this.cols&&!this.enemy.grid[rr][cc].shot)this.fireOne(rr,cc);}
    if(this.enemy.alive<=0)this.victory();},
  resolveInstant(c){const u=c.up;switch(c.id){
    case 'salvo':this.shots+=u?2:1;this.log(`<span class="am">+${u?2:1} shot${u?'s':''}.</span>`);break;
    case 'barrage':this.shots+=u?3:2;this.log(`<span class="am">+${u?3:2} shots — barrage!</span>`);break;
    case 'doctrine':this.shots+=u?4:3;this.log(`<span class="am">+${u?4:3} shots!</span>`);break;
    case 'flank':this.energy+=u?2:1;this.log(`Flank speed: +${u?2:1} energy.`);break;
    case 'allhands':this.energy+=u?2:1;this.shots+=u?2:1;this.drawCards(u?2:1);this.log('All hands on deck!');break;
    case 'battlestations':this.drawCards(u?3:2);this.log(`Battle stations: drew ${u?3:2}.`);break;
    case 'hull':this.ironHull+=u?3:2;this.log(`Iron Hull: next ${u?3:2} hits blocked.`);break;
    case 'evade':this.evade=true;this.evadeChance=u?0.7:0.5;this.log('Evasive course plotted.');break;
    case 'smoke':this.smoke+=u?2:1;this.log('Smoke screen up.');break;
    case 'buoy':this.decoyWaste+=u?2:1;this.log('Ghost buoy deployed.');break;
    case 'mirror':this.decoyWaste+=u?3:2;this.log('Mirror fleet deployed.');break;
    case 'chaff':this.ai.targets=[];if(u)this.ironHull+=1;this.log('Chaff — enemy targeting reset.');break;
    case 'overkill':this.overkill=true;this.overkillMult=u?3:2;this.log('<span class="am">Overkill armed.</span>');break;
    case 'chainshot':this.chain=true;this.chainAmt=u?2:1;this.log('Chain shot ready.');break;
    case 'heat':this.heatMap(u);break;
    case 'recon':this.scout(u?3:2,'Recon drone');break;
    case 'activesonar':this.activeSonar(u);break;
    case 'eye':this.admiralsEye(u);break;
    case 'damagecontrol':this.repairTiles(u?2:1);break;
    case 'bulkhead':if(this.bulkheadUsed){this.log('Bulkhead already used this battle.');this.energy+=c.cost;}else{this.bulkheadUsed=true;this.ironHull+=u?3:2;this.log(`Bulkhead sealed — next ${u?3:2} hits negated.`);}break;

    case 'drydock':this.dryDock(u);break;
    case 'scuttle':this.scuttle(u);break;
    case 'salvage':this.salvageGhost();if(u)this.salvageGhost();break;

  drawCards(n){for(let k=0;k<n;k++){if(this.hand.length>=this.handSize+3)break;if(this.drawPile.length===0){if(this.discard.length===0)break;this.drawPile=shuffle(this.discard);this.discard=[];}this.hand.push(this.drawPile.pop());}this.dealAnim=true;},
  repairTiles(n){let healed=0,failed=0;for(let k=0;k<n;k++){const ship=this.player.ships.filter(s=>!s.sunk&&s.hits>0).sort((a,b)=>b.hits-a.hits)[0];if(!ship)break;if(Math.random()<0.15){failed++;continue;}const cell=ship.cells.find(([r,c])=>this.player.grid[r][c].hit);if(!cell)break;const[r,c]=cell;this.player.grid[r][c].hit=false;this.player.grid[r][c].shot=false;ship.hits--;healed++;}

  dryDock(up){const dmg=this.player.ships.filter(s=>!s.sunk&&s.hits>0).sort((a,b)=>b.hits-a.hits)[0];if(!dmg){this.log('No damaged ship to dry-dock.');return;}

  scuttle(up){const live=this.player.ships.filter(s=>!s.sunk).sort((a,b)=>a.len-b.len);if(live.length<=1){this.log('Cannot scuttle your last ship.');return;}

  salvageGhost(){const cell=randomEmptyCell(this.player,this.ghosts,this.rows,this.cols);if(!cell){this.log('No open water for a ghost hull.');return;}this.ghosts.push({r:cell[0],c:cell[1],turns:-1});this.log('<span class="gd">Salvage Op</span> — a ghost hull rises (absorbs 1 hit).');Sound.draw();},

  heatMap(up){const cols=[];for(let c=0;c<this.cols;c++){let n=0;for(let r=0;r<this.rows;r++){const t=this.enemy.grid[r][c];if(t.ship&&!t.shot&&!(t.shipRef&&t.shipRef.kind==='sub'))n++;}cols.push([n,c]);}cols.sort((a,b)=>b[0]-a[0]);const k=up?2:1;const pick=cols.slice(0,k).map(x=>x[1]);pick.forEach(c=>{for(let r=0;r<this.rows;r++)this.revealAt(r,c);});this.log(`<span class="gd">Heat Map:</span> column${k>1?'s':''} <b>${pick.map(c=>COLS[c]).join(', ')}</b> hottest.`);Sound.draw();},

  /* ---------- FIRING ---------- */
  boardClick(r,c){
    this.clearAuto();

  canAfford(k){let cost=k.cost;if(this.admiral.id==='silas'&&k.cat==='DECOY')cost=0;return cost<=this.energy;},
  nudge(r,c){const m=document.getElementById('modal');m.innerHTML=`<h2 style="font-size:.9rem">UNPLAYED CARDS</h2><p>You still have cards you could play this turn. Fire anyway, or play cards first?</p>

  doFire(r,c){
    this.fired=true;

    if(this.weather&&this.weather.id==='storm'&&shape==='single'&&Math.random()<0.3){const ns=neighbors(r,c,this.rows,this.cols).filter(([rr,cc])=>!this.enemy.grid[rr][cc].shot);if(ns.length){const[nr,nc]=ns[Math.floor(Math.random()*ns.length)];this.log('<span class="am">🌩️ The storm throws your shot off-target!</span>');r=nr;c=nc;}}

  },
  fireShape(shape,r,c){const u=this.armUp;let cells=[[r,c]];
    if(shape==='spread')cells=u?[[r,c-2],[r,c-1],[r,c],[r,c+1],[r,c+2]]:[[r,c-1],[r,c],[r,c+1]];
    else if(shape==='torpedo')cells=u?[[r-2,c],[r-1,c],[r,c],[r+1,c],[r+2,c]]:[[r-1,c],[r,c],[r+1,c]];
    else if(shape==='depthcharge')cells=u?[[r-1,c-1],[r-1,c],[r-1,c+1],[r,c-1],[r,c],[r,c+1],[r+1,c-1],[r+1,c],[r+1,c+1]]:[[r,c],[r,c+1],[r+1,c],[r+1,c+1]];
    else if(shape==='nuke')cells=[[r-1,c-1],[r-1,c],[r-1,c+1],[r,c-1],[r,c],[r,c+1],[r+1,c-1],[r+1,c],[r+1,c+1]];

  fireOne(r,c){const t=this.enemy.grid[r][c];if(t.shot)return;t.shot=true;t.sonar=null;t.seen=this.turn;
    if(t.ship){t.hit=true;const s=t.shipRef;const wasDmg=s.hits>0;s.hits++;this.stats.hits++;
      if(s.kind==='artillery'){this.enemyBonusShot=(this.enemyBonusShot||0)+1;this.log('<span class="bd">⚠ Artillery cruiser struck — enemy gains +1 shot next turn!</span>');}
      let add=10;if(this.player.ships.find(x=>x.name==='Battleship'&&!x.sunk))add+=5;

      if(this.admiral.id==='yara'&&Math.random()<0.35){const ns=neighbors(r,c,this.rows,this.cols).filter(([rr,cc])=>!this.enemy.grid[rr][cc].shot);if(ns.length){const[nr,nc]=ns[Math.floor(Math.random()*ns.length)];this.log('<span class="am">Splash!</span>');this.fireOne(nr,nc);}}

        this.render();const q=FX.atCell('enemy-grid',r,c);if(q){FX.popup(q.x,q.y-24,s.name+' SUNK','#ff5a3c');FX.burst(q.x,q.y,'#ffd34d',24);}
        s.cells.forEach(([rr,cc])=>{const e=FX.atCell('enemy-grid',rr,cc);if(e&&e.el)e.el.classList.add('reveal');});Sound.sink();this.bump();}

    } else {this.streak=0;this.log('Splash — miss '+COLS[c]+(r+1)+'.');this.render();const p=FX.atCell('enemy-grid',r,c);if(p){FX.burst(p.x,p.y,'#4f9fd0',6);if(p.el)p.el.classList.add('pop');}Sound.miss();}},
  ping(r,c){let f=0;const fog=this.weather&&this.weather.id==='fog';for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(fog&&Math.abs(dr)+Math.abs(dc)===2)continue;if(this.revealAt(r+dr,c+dc))f++;}this.log(`<span class="gd">Ping</span> ${COLS[c]}${r+1}: ${f?('<b>'+f+'</b> contact'+(f>1?'s':'')):'clear'}${fog?' (fog)':''}.`);Sound.draw();},
  wideScan(r){let f=0;for(let c=0;c<this.cols;c++){if(this.revealAt(r,c))f++;}this.log(`<span class="gd">Wide scan</span> row ${r+1}: <b>${f}</b> hull cells.`);Sound.draw();},

  /* ---------- TURN-FLOW AUTO ADVANCE ---------- */

  /* ---------- ENEMY ---------- */
  endTurn(){if(this.phase!=='combat')return;this.clearAuto();if(this.targeting){this.targeting=null;this.setHelp('Tap a cell to fire.');this.banner('');}this.armed=null;
    this.discard.push(...this.hand);this.hand=[];this.log('<span class="ln">You end the turn.</span>');this.enemyTurn();},
  enemyTurn(){
    this.turn=(this.turn||1);
    if(this.invis>0){this.invis--;this.log(`<span class="gd">Dead Man's Course</span> — the enemy fires blind into the fog. (${this.invis} turns left)`);return this.afterEnemy();}
    if(this.smoke>0){this.smoke--;this.log('<span class="gd">Smoke screen</span> — enemy fires blind, misses entirely.');return this.afterEnemy();}
    let shots=this.enemyShots;if(this.faction.ai==='adaptive'){this.adaptiveBoost++;shots+=Math.floor(this.adaptiveBoost/2);}

    shots+=(this.enemyBonusShot||0);this.enemyBonusShot=0;
    let waste=this.decoyWaste;this.decoyWaste=0;
    for(let i=0;i<shots;i++){if(this.player.alive<=0)break;

      const cell=this.aiPick();if(!cell)break;let[r,c]=cell;
      if(this.weather&&this.weather.id==='storm'&&Math.random()<0.3){const ns=neighbors(r,c,this.rows,this.cols);if(ns.length)[r,c]=ns[Math.floor(Math.random()*ns.length)];}

      const t=this.player.grid[r][c];t.shot=true;t.seen=this.turn;neighbors(r,c,this.rows,this.cols).forEach(([rr,cc])=>this.player.grid[rr][cc].seen=this.turn);

        if(this.evade&&Math.random()<(this.evadeChance||0.5)){this.log(`<span class="gd">Evaded</span> ${COLS[c]}${r+1}.`);this.render();const p=FX.atCell('player-grid',r,c);if(p)FX.popup(p.x,p.y,'DODGE','#3ee08a');Sound.draw();continue;}

        t.hit=true;const s=t.shipRef;s.hits++;this.ai.targets.push(...neighbors(r,c,this.rows,this.cols).filter(([rr,cc])=>!this.player.grid[rr][cc].shot));
        this.render();const p=FX.atCell('player-grid',r,c);if(p){FX.burst(p.x,p.y,'#ff5a3c',12);if(p.el)p.el.classList.add('pop');}Sound.hit();FX.shake();
        if(s.hits>=s.len&&!s.sunk){s.sunk=true;s.cells.forEach(([rr,cc])=>this.player.grid[rr][cc].sunkx=true);this.player.alive--;this.ai.targets=[];this.log(`<span class="bd">Your ${s.name} was SUNK!</span>`);if(p)FX.popup(p.x,p.y-24,'LOST','#ff7a78');portrait('grimace');foePortrait('triumph');Sound.sink();}
        else {this.log(`<span class="bd">Enemy HIT</span> ${COLS[c]}${r+1}.`);portrait('hit');}
      } else {this.log(`Enemy misses ${COLS[c]}${r+1}.`);this.render();const p=FX.atCell('player-grid',r,c);if(p)FX.burst(p.x,p.y,'#4f9fd0',5);Sound.miss();}
    }

  },
  afterEnemy(){this.evade=false;this.specialsTick();this.bossTickRun();if(this.player.sync)this.player.sync();if(this.player.alive<=0){this.render();return this.defeat();}this.turn++;this.startTurn(false);this.render();},
  specialsTick(){if(!this.enemy)return;this.enemy.ships.filter(s=>!s.sunk&&s.kind==='tender').forEach(td=>{
    const adj=this.enemy.ships.find(o=>o!==td&&!o.sunk&&o.hits>0&&o.cells.some(([r,c])=>td.cells.some(([tr,tc])=>Math.abs(tr-r)+Math.abs(tc-c)===1)));
    if(adj){const cell=adj.cells.find(([r,c])=>this.enemy.grid[r][c].hit);if(cell){const[r,c]=cell;const t=this.enemy.grid[r][c];t.hit=false;t.shot=false;t.sonar=null;adj.hits--;this.log('<span class="bd">🟩 A repair tender patches an enemy hull.</span>');}}});},
  bossTickRun(){if(!this.bossMech)return;this.bossTick++;
    if(this.bossMech==='regen'&&this.bossTick%2===0){const d=this.enemy.ships.find(s=>!s.sunk&&s.hits>0);if(d){const cell=d.cells.find(([r,c])=>this.enemy.grid[r][c].hit);if(cell){const[r,c]=cell;const t=this.enemy.grid[r][c];t.hit=false;t.shot=false;t.sonar=null;d.hits--;this.log('<span class="bd">🛡️ The Iron Armada reseals a breach!</span>');}}}
    if(this.bossMech==='spawn'&&this.bossTick%3===0){if(this.spawnEnemy(2))this.log('<span class="bd">☠️ The Carrion Fleet swells — a fresh hull surfaces!</span>');}
    if(this.bossMech==='kraken'&&this.bossTick%2===0){let n=0;const seen=[];for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const t=this.enemy.grid[r][c];if((t.shot&&!t.hit)||t.sonar)seen.push([r,c]);}shuffle(seen);seen.slice(0,3).forEach(([r,c])=>{const t=this.enemy.grid[r][c];t.shot=false;t.sonar=null;n++;});
      const open=[];for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const t=this.player.grid[r][c];if(t.ship&&!t.hit)open.push([r,c]);}
      if(open.length){if(this.ironHull>0){this.ironHull--;this.log('<span class="gd">A tentacle is turned aside by your iron hull.</span>');}else{const[r,c]=open[Math.floor(Math.random()*open.length)];const t=this.player.grid[r][c];t.hit=true;t.shot=true;const s=t.shipRef;s.hits++;if(s.hits>=s.len&&!s.sunk){s.sunk=true;s.cells.forEach(([rr,cc])=>this.player.grid[rr][cc].sunkx=true);this.player.alive--;}this.log('<span class="bd">🦑 A tentacle smashes your deck!</span>');}}
      if(n)this.log('<span class="bd">🌊 The Kraken drags '+n+' contact(s) back into the deep.</span>');}
    if(this.bossMech==='mega'){const big=this.enemy.ships.filter(s=>!s.sunk&&s.hits===0).sort((a,b)=>b.len-a.len)[0];if(big){relocateShip(this.enemy,big,this.rows,this.cols);big.cells.forEach(([r,c])=>{this.enemy.grid[r][c].sonar=null;});this.log('<span class="bd">🦈 The Megalodon submerges and resurfaces elsewhere!</span>');}}},
  spawnEnemy(len){for(let g=0;g<200;g++){const horiz=Math.random()<.5;const maxR=horiz?this.rows:this.rows-len+1,maxC=horiz?this.cols-len+1:this.cols;if(maxR<=0||maxC<=0)return false;
    const r=Math.floor(Math.random()*maxR),c=Math.floor(Math.random()*maxC);const cells=[];let ok=true;
    for(let i=0;i<len;i++){const rr=horiz?r:r+i,cc=horiz?c+i:c;const t=this.enemy.grid[rr][cc];if(t.ship||t.shot){ok=false;break;}cells.push([rr,cc]);}
    if(!ok)continue;const s={name:'Destroyer',len,hits:0,sunk:false,cells};cells.forEach(([rr,cc])=>{this.enemy.grid[rr][cc].ship=true;this.enemy.grid[rr][cc].shipRef=s;this.enemy.grid[rr][cc].sonar=null;});this.enemy.ships.push(s);this.enemy.alive++;return true;}return false;},
  aiPick(){
    while(this.ai.targets.length){const[r,c]=this.ai.targets.pop();if(this.weather&&this.weather.id==='fog'&&Math.random()<0.4)continue;if(!this.player.grid[r][c].shot)return[r,c];}
    if(this.faction.ai==='sniper'){const big=this.player.ships.filter(s=>!s.sunk).sort((a,b)=>b.len-a.len)[0];
      if(big){const cand=[];big.cells.forEach(([r,c])=>{if(!this.player.grid[r][c].shot)cand.push([r,c]);neighbors(r,c,this.rows,this.cols).forEach(([rr,cc])=>{if(!this.player.grid[rr][cc].shot)cand.push([rr,cc]);});});if(cand.length&&Math.random()<0.6)return cand[Math.floor(Math.random()*cand.length)];}}
    const opts=[];for(let r=0;r<this.rows;r++)for(let c=0;c<this.cols;c++){const t=this.player.grid[r][c];if(t.shot)continue;if(this.faction.ai==='hunter'&&(r+c)%2!==0)continue;opts.push([r,c]);}
    const pool=opts.length?opts:allUnshot(this.player);if(!pool.length)return null;return pool[Math.floor(Math.random()*pool.length)];},

  /* ---------- SCORING ---------- */
  addGold(n){let g=n;if(this.hasRelic('anchor'))g=Math.round(g*1.25);if(this.doctrine==='fortune')g=Math.round(g*1.5);this.gold+=g;this.renderTop();Sound.coin();},
  bump(){const el=document.getElementById('scorehud');el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');this.renderScore();},
  renderScore(){document.getElementById('h-chips').textContent=Math.round(this.chips);document.getElementById('h-mult').textContent=this.mult.toFixed(1);},

  /* ---------- VICTORY ---------- */
  victory(){this.clearAuto();this._sigShown=false;if(this.player.sync)this.player.sync();
    if(this.hasRelic('shipwright'))this.fleet.forEach(s=>{if(s.hits>0)s.hits--;});
    let bonus=0;const lines=[];const base=Math.round(this.chips*this.mult);
    if(this.hasRelic('charm')){const lc=Math.max(0,this.shots)*40;bonus+=lc;if(lc)lines.push(['Lucky Charm','+'+lc]);}
    const intact=this.player.ships.filter(s=>!s.sunk&&s.hits===0).length;const ib=intact*60;bonus+=ib;if(ib)lines.push([intact+' pristine hulls','+'+ib]);
    const kb={boss:500,elite:200,scout:0,standard:80}[this.battleKind]||0;bonus+=kb;if(kb)lines.push([this.battleKind.toUpperCase(),'+'+kb]);
    const total=base+bonus;this.runScore+=total;if(total>this.stats.bestBattle)this.stats.bestBattle=total;
    this.addGold(({boss:55,elite:35,scout:8,standard:15})[this.battleKind]||15);
    this.battlesWon++;this.actBattle++;this.renderTop();Sound.win();portrait('victory');foePortrait('grimace');
    this.showTally(base,bonus,total);},
  showTally(base,bonus,total){const m=document.getElementById('modal');
    const extra=[];if(bonus){extra.push(`<div class="row"><span>Bonuses</span><span>+${bonus}</span></div>`);}
    m.innerHTML=`<h2 class="win">${this.battleKind==='boss'?'BOSS DOWN':'NODE CLEARED'}</h2>
      <div class="tally"><div class="row"><span>Chips</span><span class="cc">${Math.round(this.chips)}</span></div>
      <div class="row"><span>Mult</span><span class="mm">×${this.mult.toFixed(1)}</span></div>
      <div class="row"><span>Base</span><span>${base}</span></div>${extra.join('')}
      <div class="big" id="tt">+0</div></div>
      <p>Run score <b>${this.runScore.toLocaleString()}</b> · Gold <b>${this.gold}</b></p><div id="rz"></div>`;
    document.getElementById('ovl').classList.add('show');
    let cur=0;const step=Math.max(1,Math.round(total/30));const tEl=m.querySelector('#tt');
    const iv=setInterval(()=>{cur=Math.min(total,cur+step);tEl.textContent='+'+cur.toLocaleString();Sound.draw();if(cur>=total){clearInterval(iv);this.showReward();}},26);},
  showReward(){
    const z=document.getElementById('rz');const give=(this.battleKind==='elite'||this.battleKind==='boss');
    const sig=SIGS[this.admiral.id];
    if(give&&sig&&this.admiral.id!=='blacktide'&&!this.deck.some(k=>k.id===sig.id)&&!this._sigShown){this._sigShown=true;
      z.innerHTML=`<div style="font-size:.78rem;color:var(--omega);margin:6px 0">⭐ SIGNATURE CARD — claim your flagship move</div><div class="rewards" id="rzz"></div><button class="btn btn-end btn-sm" onclick="game.showReward()">Decline ▸</button>`;
      const rz=z.querySelector('#rzz');const el=document.createElement('div');el.className='card';el.style.animation='none';el.innerHTML=cardInner(sig);el.onclick=()=>{this.deck.push({...sig});Sound.card();this.afterReward();};rz.appendChild(el);return;}

      z.innerHTML=`<div style="font-size:.78rem;color:#9fc2dd;margin:6px 0">CLAIM A RELIC</div><div class="rewards" id="rzz"></div><button class="btn btn-end btn-sm" onclick="game.afterReward()">Skip ▸</button>`;
      const rz=z.querySelector('#rzz');picks.forEach(r=>{const el=document.createElement('div');el.className='relic-card';el.style.cursor='pointer';el.innerHTML=`<div class="ri">${r.ic}</div><div class="rn">${r.name}</div><div class="rd">${r.ds}</div>`;el.onclick=()=>{this.addRelic(r.id);Sound.coin();this.afterReward();};rz.appendChild(el);});
    } else {const picks=shuffle(weightedCards()).slice(0,3);
      z.innerHTML=`<div style="font-size:.78rem;color:#9fc2dd;margin:6px 0">DRAFT A CARD</div><div class="rewards" id="rzz"></div><button class="btn btn-end btn-sm" onclick="game.afterReward()">Skip ▸</button>`;
      const rz=z.querySelector('#rzz');picks.forEach(c=>{const el=document.createElement('div');el.className='card';el.style.animation='none';el.innerHTML=cardInner(c);el.onclick=()=>{this.deck.push({...c});Sound.card();this.afterReward();};rz.appendChild(el);});}
  },
  grantShip(name){this.fleet.push({name,len:SHIP_DEFS[name],hits:0,sunk:false});this.toast('+1 '+name+' joins your fleet');Sound.coin();this.afterReward();},

  recordRun(win){if(this._recorded)return;this._recorded=true;const d=Meta.data;d.runs++;d.totalSinks=(d.totalSinks||0)+((this.stats&&this.stats.sinks)||0);if(win){d.wins++;if(!this.usedSonar)d.sonarless=true;d.asc=Math.max(d.asc,Math.min(5,(this.ascension||0)+1));}if(this.runScore>d.best)d.best=this.runScore;this.recordDaily();this.clearSave();Meta.save();this.evalAchievements();},
  runComplete(){this.recordRun(true);const m=document.getElementById('modal');m.innerHTML=`<h2 class="win">VICTORY — ALL SEAS CLEARED</h2><p>You broke all three acts and their bosses. A legendary run.</p>${this.summary()}${this.lbForm('win')}<button class="btn btn-go" onclick="game.restart()">↻ New Run</button>`;document.getElementById('ovl').classList.add('show');Sound.win();},

  lbForm(result){let nm='';try{nm=localStorage.getItem('dr_name')||'';}catch(e){}

    const f=document.getElementById('lbf');if(f)f.innerHTML='<div style="color:var(--good);font-size:.82rem;padding:6px 0">✓ Submitted as <b>'+name+'</b>! <button class="btn btn-end btn-sm" onclick="game.showLeaderboard()">View board</button></div>';Sound.coin();},
  showLeaderboard(){this.closeModal();const sheet=document.getElementById('sheet');this.show('sheet');sheet.innerHTML='<h2 style="color:var(--gold)">🏆 LEADERBOARD</h2><div class="desc">Loading…</div>';
    const row=(r,i)=>`<div style="display:flex;justify-content:space-between;gap:10px;font-size:.78rem;padding:3px 8px;border-bottom:1px solid var(--line2)"><span>${i+1}. <b>${(r.name||'?')}</b> <span style="color:var(--ink3)">${r.admiral||''}${r.asc?' A'+r.asc:''}</span></span><span style="color:var(--son);font-weight:700">${(r.score||0).toLocaleString()}</span></div>`;
    const block=(rows,online,label)=>`<div style="font-size:.72rem;color:var(--ink2);margin:8px 0 2px">${label} ${online?'· 🌐 online':'· 💾 local'}</div>${rows.length?rows.map(row).join(''):'<div style="color:var(--ink3);font-size:.8rem">No scores yet — be the first!</div>'}`;

  /* ---------- SHOP / EVENT / REST / TREASURE ---------- */

  repairFleet(n){if(n>=99){let glitch=Math.random()<0.15,f=0;this.fleet.forEach(s=>{if(s.sunk)s.sunk=false;if(s.hits>0){if(glitch){s.hits=1;glitch=false;f=1;}else s.hits=0;}});this.toast(f?'Fleet repaired — one breach held':'Fleet fully repaired');return;}

/* ---- card render ---- */
function cardTpl(id){return LIB.find(c=>c.id===id)||Object.values(SIGS).find(c=>c.id===id)||null;}
function cardInner(c,cost){const cc=(cost===0||cost)?cost:c.cost;return `<div class="cost">${cc}</div><div class="cat cat-${c.cat}" style="padding-top:3px">${c.cat}</div><div class="art">${ART[c.id]||'⚓'}</div><div class="nm">${c.name}</div><div class="ds">${c.ds}</div><div class="rar r-${c.rar}">${RAR_LABEL[c.rar]}</div>`;}
function cardEl(c){return `<div class="card" style="animation:none">${cardInner(c)}</div>`;}
function cardPrice(c){return ({common:35,rare:55,forge:65,contra:80,omega:110})[c.rar]||40;}
function relicPrice(){return 90;}
function weightedCards(){const w={common:5,rare:3,forge:2,contra:1,omega:1};const out=[];LIB.forEach(c=>{for(let i=0;i<w[c.rar];i++)out.push(c);});return out;}
function hullGlyph(t,r,c){const s=t.shipRef;if(!s||s.cells.length===1)return '<div class="hull"></div>';
  const horiz=s.cells[0][0]===s.cells[1][0];const idx=s.cells.findIndex(([rr,cc])=>rr===r&&cc===c);
  let caps='';if(horiz){if(idx===0)caps=' cap-l';else if(idx===s.cells.length-1)caps=' cap-r';}else{if(idx===0)caps=' cap-t';else if(idx===s.cells.length-1)caps=' cap-b';}
  const turret=(idx===Math.floor(s.cells.length/2))?'<div class="turret"></div>':'';return `<div class="hull${caps}"></div>${turret}`;}

/* ---- board / fleet (variable grid) ---- */
function emptyGrid(rows,cols){return Array.from({length:rows},()=>Array.from({length:cols},()=>({ship:false,shipRef:null,shot:false,hit:false,sonar:null,sunkx:false,deflect:false,seen:0})));}
function cellsOf(s){const o=[];for(let i=0;i<s.len;i++)o.push(s.horiz?[s.r,s.c+i]:[s.r+i,s.c]);return o;}
function placeFleet(defs,rows,cols){const fleet=[],occ=new Set();
  for(const def of defs){let placed=false,g=0;while(!placed&&g++<900){const horiz=Math.random()<.5;
    const maxR=horiz?rows:rows-def.len+1,maxC=horiz?cols-def.len+1:cols;if(maxR<=0||maxC<=0){
      // ship too big for this orientation; force the other
      const h2=!horiz;const mR=h2?rows:rows-def.len+1,mC=h2?cols-def.len+1:cols;if(mR<=0||mC<=0)break;
      const r=Math.floor(Math.random()*mR),c=Math.floor(Math.random()*mC);const s={name:def.name,len:def.len,horiz:h2,r,c,hits:0,sunk:false};
      if(cellsOf(s).some(([rr,cc])=>occ.has(rr+','+cc)))continue;cellsOf(s).forEach(([rr,cc])=>occ.add(rr+','+cc));fleet.push(s);placed=true;continue;}
    const r=Math.floor(Math.random()*maxR),c=Math.floor(Math.random()*maxC);const s={name:def.name,len:def.len,horiz,r,c,hits:0,sunk:false};
    if(cellsOf(s).some(([rr,cc])=>occ.has(rr+','+cc)))continue;cellsOf(s).forEach(([rr,cc])=>occ.add(rr+','+cc));fleet.push(s);placed=true;}}
  return fleet;}
function placeDeploy(deploy,rows,cols){const occ=new Set();
  deploy.forEach(s=>{let placed=false,g=0;while(!placed&&g++<900){const horiz=Math.random()<.5;
    const maxR=horiz?rows:rows-s.len+1,maxC=horiz?cols-s.len+1:cols;let hh=horiz,mR=maxR,mC=maxC;
    if(mR<=0||mC<=0){hh=!horiz;mR=hh?rows:rows-s.len+1;mC=hh?cols-s.len+1:cols;}if(mR<=0||mC<=0)break;
    const r=Math.floor(Math.random()*mR),c=Math.floor(Math.random()*mC);s.r=r;s.c=c;s.horiz=hh;
    if(cellsOf(s).some(([rr,cc])=>occ.has(rr+','+cc)))continue;cellsOf(s).forEach(([rr,cc])=>occ.add(rr+','+cc));placed=true;}});}
function bakeBoard(fleet,rows,cols){const grid=emptyGrid(rows,cols),ships=[];
  fleet.forEach(f=>{const cells=cellsOf(f);const s={name:f.name,len:f.len,hits:0,sunk:false,cells};cells.forEach(([r,c])=>{grid[r][c].ship=true;grid[r][c].shipRef=s;});ships.push(s);});
  return {grid,ships,alive:ships.length,rows,cols};}
function bakeFromDeploy(deploy,rows,cols){const grid=emptyGrid(rows,cols),ships=[];let alive=0;
  deploy.forEach(f=>{const cells=cellsOf(f);const s={name:f.name,len:f.len,hits:f.hits||0,sunk:false,cells,src:f.src};
    cells.forEach(([r,c],i)=>{grid[r][c].ship=true;grid[r][c].shipRef=s;if(i<s.hits){grid[r][c].hit=true;grid[r][c].shot=true;}});ships.push(s);alive++;});
  const board={grid,ships,alive,rows,cols};
  board.sync=()=>{ships.forEach(s=>{if(s.src){s.src.hits=s.hits;s.src.sunk=s.sunk;}});};return board;}
function relocateShip(board,ship,rows,cols){const occ=new Set();board.ships.forEach(o=>{if(o!==ship&&!o.sunk)o.cells.forEach(([r,c])=>occ.add(r+','+c));});
  for(let g=0;g<400;g++){const horiz=Math.random()<.5;const maxR=horiz?rows:rows-ship.len+1,maxC=horiz?cols-ship.len+1:cols;if(maxR<=0||maxC<=0)continue;
    const r=Math.floor(Math.random()*maxR),c=Math.floor(Math.random()*maxC);const cells=[];let ok=true;
    for(let i=0;i<ship.len;i++){const rr=horiz?r:r+i,cc=horiz?c+i:c;if(occ.has(rr+','+cc)){ok=false;break;}cells.push([rr,cc]);}
    if(!ok)continue;
    ship.cells.forEach(([r0,c0])=>{const t=board.grid[r0][c0];t.ship=false;t.shipRef=null;t.hit=false;t.shot=false;t.sunkx=false;});
    ship.cells=cells;ship.hits=0;cells.forEach(([rr,cc])=>{board.grid[rr][cc].ship=true;board.grid[rr][cc].shipRef=ship;});return true;}
  return false;}
function randomEmptyCell(board,ghosts,rows,cols){const taken=new Set();for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const t=board.grid[r][c];if(t.ship||t.shot)taken.add(r+','+c);}(ghosts||[]).forEach(g=>taken.add(g.r+','+g.c));
  const free=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(!taken.has(r+','+c))free.push([r,c]);return free.length?free[Math.floor(Math.random()*free.length)]:null;}
function neighbors(r,c,rows,cols){return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([rr,cc])=>rr>=0&&cc>=0&&rr<rows&&cc<cols);}
function allUnshot(b){const o=[];for(let r=0;r<b.rows;r++)for(let c=0;c<b.cols;c++)if(!b.grid[r][c].shot)o.push([r,c]);return o;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

/* ---- enemy fleet sizing by grid + variant ---- */
function enemyFleetFor(rows,cols,variant){
  const cells=rows*cols,maxLen=Math.max(rows,cols);
  const density=variant==='scout'?0.16:variant==='elite'?0.34:variant==='boss'?0.42:0.26;
  let budget=Math.max(4,Math.round(cells*density));
  const pool=[['Carrier',5],['Battleship',4],['Cruiser',3],['Submarine',3],['Destroyer',2]].filter(s=>s[1]<=maxLen);
  const names=[];let used=0,guard=0;const cap=variant==='boss'?8:variant==='scout'?2:6;
  while(used<budget&&guard++<30&&names.length<cap){const remaining=budget-used;const choices=pool.filter(s=>s[1]<=remaining+1);if(!choices.length)break;const pick=choices[Math.floor(Math.random()*choices.length)];names.push(pick[0]);used+=pick[1];}
  while(names.length<2&&pool.length)names.push(pool[pool.length-1][0]);
  if(!names.length)names.push('Destroyer');return names.map(n=>({name:n,len:SHIP_DEFS[n]}));}
function assignSpecials(board,kind,act){const out=[];const ships=board.ships.slice();shuffle(ships);
  const add=k=>{const s=ships.find(x=>!x.kind&&!(k==='sub'&&x.len>=4));if(s){s.kind=k;out.push(k);}};
  const R=()=>['sub','tender','artillery'][Math.floor(Math.random()*3)];
  if(kind==='boss'){add('tender');add('sub');}
  else if(kind==='elite'){add(R());}
  else if(act>=2&&Math.random()<0.30){add(R());}
  return out;}

/* ---- map gen with node variance (Sprint 2) ---- */
function pickNodeType(){const r=Math.random();
  if(r<0.30)return 'standard';if(r<0.45)return 'scout';if(r<0.58)return 'elite';if(r<0.70)return 'ambush';
  if(r<0.82)return 'event';if(r<0.91)return 'shop';if(r<0.97)return 'rest';return 'treasure';}
function genMap(){const FLOORS=7,floors=[];
  for(let f=0;f<FLOORS;f++){let nodes;
    if(f===0)nodes=[{type:'scout'}];
    else if(f===FLOORS-1)nodes=[{type:'boss'}];
    else{const count=2+(Math.random()<0.5?1:0);nodes=[];for(let i=0;i<count;i++)nodes.push({type:pickNodeType()});}
    floors.push(nodes.map((n,i)=>({type:n.type,f,i,links:[],done:false})));}
  for(let f=0;f<FLOORS-1;f++){const cur=floors[f],nxt=floors[f+1];
    cur.forEach((node,i)=>{const center=nxt.length===1?0:Math.round((i/Math.max(1,cur.length-1))*(nxt.length-1));
      const set=new Set([center]);if(nxt.length>1&&Math.random()<0.6)set.add(clamp(center+(Math.random()<.5?-1:1),0,nxt.length-1));node.links=[...set];});
    nxt.forEach((nn,j)=>{if(!cur.some(node=>node.links.includes(j))){let best=0,bd=99;cur.forEach((node,i)=>{const center=Math.round((i/Math.max(1,cur.length-1))*(nxt.length-1));const d=Math.abs(center-j);if(d<bd){bd=d;best=i;}});cur[best].links.push(j);}});}
  return {floors,cur:null};}

  if(c.hat==='tie'){px(3,2,6,2,c.hair);px(2,3,1,3,c.hair);px(9,3,1,3,c.hair);px(8,2,3,1,c.acc);}
  if(c.hat==='pirate'){px(0,3,12,1,c.hatC);px(1,2,10,1,c.hatC);px(3,1,6,1,c.hatC);px(2,2,2,1,c.acc);if(c.feather){px(9,0,1,3,'#cc4433');px(10,1,1,2,'#cc4433');}}
  if(c.hat==='cap'){px(2,2,8,2,c.hatC);px(1,3,10,1,c.cd);if(c.skull){px(4,4,1,1,'#1a1a1a');px(7,4,1,1,'#1a1a1a');}}
  if(c.scope){px(9,6,3,1,c.acc);px(11,5,1,3,'#cfe3f2');}
  return `<svg viewBox="0 0 ${W*P} ${H*P}" width="100%" height="100%" shape-rendering="crispEdges" style="image-rendering:pixelated;display:block">${r.join('')}</svg>`;}
function setupPortraits(){const adm=game.admiral;const p=document.getElementById('p-portrait'),e=document.getElementById('e-portrait');
  if(p&&adm){p.style.setProperty('--coat',ADM_COAT[adm.id]||'#26456b');p.querySelector('.face').innerHTML=pixelBust(adm.id);p.querySelector('.cn').textContent=adm.name.replace(/^(Adm\.|Cmdr\.|Capt\.) /,'');p.className='portrait idle';}
