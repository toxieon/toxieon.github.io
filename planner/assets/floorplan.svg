<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Ground floor building plan">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27313e" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#111827"/>
  <rect x="48" y="48" width="1504" height="904" rx="22" fill="#151a22" stroke="#354152" stroke-width="6" filter="url(#softShadow)"/>
  <rect x="72" y="72" width="1456" height="856" fill="url(#grid)" opacity="0.45"/>

  <g fill="#1d2530" stroke="#7b8794" stroke-width="8" stroke-linejoin="round">
    <rect x="120" y="120" width="290" height="190"/>
    <rect x="410" y="120" width="330" height="190"/>
    <rect x="740" y="120" width="300" height="190"/>
    <rect x="1040" y="120" width="430" height="190"/>
    <rect x="120" y="310" width="290" height="270"/>
    <rect x="410" y="310" width="630" height="270"/>
    <rect x="1040" y="310" width="430" height="270"/>
    <rect x="120" y="580" width="360" height="300"/>
    <rect x="480" y="580" width="300" height="300"/>
    <rect x="780" y="580" width="330" height="300"/>
    <rect x="1110" y="580" width="360" height="300"/>
  </g>

  <g fill="none" stroke="#d9e2ec" stroke-width="12" stroke-linecap="round">
    <path d="M410 216 h50"/>
    <path d="M740 216 h50"/>
    <path d="M1040 216 h50"/>
    <path d="M260 310 v50"/>
    <path d="M620 310 v50"/>
    <path d="M1190 310 v50"/>
    <path d="M410 448 h50"/>
    <path d="M1040 448 h50"/>
    <path d="M300 580 v50"/>
    <path d="M480 720 h50"/>
    <path d="M780 720 h50"/>
    <path d="M1110 720 h50"/>
  </g>

  <g fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="0">
    <text x="174" y="225">Reception</text>
    <text x="498" y="225">Office A</text>
    <text x="828" y="225">Office B</text>
    <text x="1170" y="225">Training</text>
    <text x="188" y="462">Comms</text>
    <text x="642" y="462">Open Work Area</text>
    <text x="1160" y="462">Workshop</text>
    <text x="235" y="735">Store</text>
    <text x="568" y="735">Server</text>
    <text x="880" y="735">Plant</text>
    <text x="1210" y="735">Loading</text>
  </g>

  <g stroke="#475569" stroke-width="5">
    <line x1="120" y1="90" x2="120" y2="930"/>
    <line x1="1480" y1="90" x2="1480" y2="930"/>
    <line x1="90" y1="120" x2="1510" y2="120"/>
    <line x1="90" y1="880" x2="1510" y2="880"/>
  </g>

  <g fill="#0f1117" stroke="#94a3b8" stroke-width="5">
    <rect x="678" y="896" width="244" height="38" rx="19"/>
  </g>
  <text x="800" y="923" text-anchor="middle" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Ground Floor</text>
</svg>
